<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Layout Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --panel-bg: #1a1d27;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #2e3342;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --grid-bg: #1e212b;
            --grid-item: #2dd4bf;
        }

        body.light-theme {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --grid-bg: #f1f5f9;
            --grid-item: #14b8a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
            font-size: 1.25rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 1.25rem;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .section {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .control-group {
            margin-bottom: 1rem;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .control-header label {
            font-weight: 500;
        }

        .control-header span {
            color: var(--accent-color);
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .input-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem;
            border-radius: 4px;
            font-family: inherit;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
            width: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .btn-outline:hover {
            background-color: var(--border-color);
        }

        .btn-icon {
            padding: 0.25rem 0.5rem;
            font-size: 1.25rem;
            line-height: 1;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .track-item {
            display: flex;
            gap: 0.5rem;
        }

        .track-item input {
            flex: 1;
        }

        .track-item button {
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            padding: 0 0.5rem;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        .preview-container {
            flex: 1;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .grid-preview {
            background-color: var(--grid-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
            display: grid;
            resize: both;
            overflow: auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .grid-item-demo {
            background-color: var(--grid-item);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 1.25rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .grid-item-demo:hover {
            opacity: 1;
        }

        .code-panel {
            height: 300px;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .code-tabs {
            display: flex;
            gap: 1rem;
        }

        .code-tab {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
            padding-bottom: 0.25rem;
            border-bottom: 2px solid transparent;
        }

        .code-tab.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .code-content {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            color: #e2e8f0;
            background-color: #0f111a;
            white-space: pre-wrap;
        }

        .code-content.light {
            background-color: #f8fafc;
            color: #1e293b;
        }

        .token-selector { color: #fba922; }
        .token-property { color: #2dd4bf; }
        .token-value { color: #f472b6; }
        .token-punctuation { color: #94a3b8; }
        
        @media (max-width: 768px) {
            main {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="3" y1="9" x2="21" y2="9"></line>
                <line x1="9" y1="21" x2="9" y2="9"></line>
            </svg>
            CSS Grid Layout Generator
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">☼</button>
    </header>

    <main>
        <div class="sidebar">
            <div class="section">
                <div class="section-title">Grid Settings</div>
                
                <div class="control-group">
                    <div class="control-header">
                        <label>Column Gap</label>
                        <span id="colGapVal">1rem</span>
                    </div>
                    <input type="range" id="colGap" min="0" max="100" value="16" oninput="updateGrid()">
                </div>

                <div class="control-group">
                    <div class="control-header">
                        <label>Row Gap</label>
                        <span id="rowGapVal">1rem</span>
                    </div>
                    <input type="range" id="rowGap" min="0" max="100" value="16" oninput="updateGrid()">
                </div>
            </div>

            <div class="section">
                <div class="section-title">Columns (<span id="colCount">3</span>)</div>
                <div class="track-list" id="colTracks">
                    <!-- Columns injected here -->
                </div>
                <button class="btn btn-outline" onclick="addColumn()">+ Add Column</button>
            </div>

            <div class="section">
                <div class="section-title">Rows (<span id="rowCount">3</span>)</div>
                <div class="track-list" id="rowTracks">
                    <!-- Rows injected here -->
                </div>
                <button class="btn btn-outline" onclick="addRow()">+ Add Row</button>
            </div>
            
            <div class="section">
                <button class="btn btn-outline" style="color: var(--danger-color); border-color: var(--danger-color);" onclick="resetGrid()">Reset Grid</button>
            </div>
        </div>

        <div class="workspace">
            <div class="preview-container">
                <div class="grid-preview" id="gridPreview">
                    <!-- Grid items injected here -->
                </div>
            </div>

            <div class="code-panel">
                <div class="code-header">
                    <div class="code-tabs">
                        <button class="code-tab active" id="tab-css" onclick="switchCodeTab('css')">CSS</button>
                        <button class="code-tab" id="tab-html" onclick="switchCodeTab('html')">HTML</button>
                    </div>
                    <button class="btn" style="width: auto;" onclick="copyCode()">Copy Code</button>
                </div>
                <div class="code-content" id="codeContent">
                    <!-- Code injected here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        let isDark = true;
        let columns = ['1fr', '1fr', '1fr'];
        let rows = ['1fr', '1fr', '1fr'];
        let activeTab = 'css';

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-theme', !isDark);
            document.getElementById('codeContent').classList.toggle('light', !isDark);
            renderCode();
        }

        function createTrackInput(type, index, val) {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.innerHTML = `
                <input type="text" value="${val}" onchange="updateTrack('${type}', ${index}, this.value)" placeholder="1fr, 100px, auto">
                <button onclick="removeTrack('${type}', ${index})">×</button>
            `;
            return div;
        }

        function renderTracks() {
            const colContainer = document.getElementById('colTracks');
            colContainer.innerHTML = '';
            columns.forEach((val, i) => colContainer.appendChild(createTrackInput('col', i, val)));
            document.getElementById('colCount').textContent = columns.length;

            const rowContainer = document.getElementById('rowTracks');
            rowContainer.innerHTML = '';
            rows.forEach((val, i) => rowContainer.appendChild(createTrackInput('row', i, val)));
            document.getElementById('rowCount').textContent = rows.length;
        }

        function updateTrack(type, index, value) {
            if(type === 'col') columns[index] = value;
            else rows[index] = value;
            updateGrid();
        }

        function addColumn() {
            columns.push('1fr');
            renderTracks();
            updateGrid();
        }

        function addRow() {
            rows.push('1fr');
            renderTracks();
            updateGrid();
        }

        function removeTrack(type, index) {
            if(type === 'col') {
                if(columns.length <= 1) return;
                columns.splice(index, 1);
            } else {
                if(rows.length <= 1) return;
                rows.splice(index, 1);
            }
            renderTracks();
            updateGrid();
        }

        function resetGrid() {
            columns = ['1fr', '1fr', '1fr'];
            rows = ['1fr', '1fr', '1fr'];
            document.getElementById('colGap').value = 16;
            document.getElementById('rowGap').value = 16;
            renderTracks();
            updateGrid();
        }

        function updateGrid() {
            const colGap = document.getElementById('colGap').value;
            const rowGap = document.getElementById('rowGap').value;
            
            document.getElementById('colGapVal').textContent = `${colGap}px`;
            document.getElementById('rowGapVal').textContent = `${rowGap}px`;

            const grid = document.getElementById('gridPreview');
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = columns.join(' ');
            grid.style.gridTemplateRows = rows.join(' ');
            grid.style.columnGap = `${colGap}px`;
            grid.style.rowGap = `${rowGap}px`;

            // Update items
            const totalItems = columns.length * rows.length;
            grid.innerHTML = '';
            for(let i=1; i<=totalItems; i++) {
                const item = document.createElement('div');
                item.className = 'grid-item-demo';
                item.textContent = i;
                grid.appendChild(item);
            }

            renderCode();
        }

        function switchCodeTab(tab) {
            activeTab = tab;
            document.getElementById('tab-css').classList.toggle('active', tab === 'css');
            document.getElementById('tab-html').classList.toggle('active', tab === 'html');
            renderCode();
        }

        function renderCode() {
            const codeContainer = document.getElementById('codeContent');
            const colGap = document.getElementById('colGap').value;
            const rowGap = document.getElementById('rowGap').value;
            
            const cssString = 
`.grid-container {
  display: grid;
  grid-template-columns: ${columns.join(' ')};
  grid-template-rows: ${rows.join(' ')};
  gap: ${rowGap}px ${colGap}px;
}`;
            
            const totalItems = columns.length * rows.length;
            let htmlString = `<div class="grid-container">\n`;
            for(let i=1; i<=totalItems; i++) {
                htmlString += `  <div class="grid-item">${i}</div>\n`;
            }
            htmlString += `</div>`;

            if(activeTab === 'css') {
                codeContainer.innerHTML = cssString
                    .replace('.grid-container', '<span class="token-selector">.grid-container</span>')
                    .replace(/display:|grid-template-columns:|grid-template-rows:|gap:/g, match => `<span class="token-property">${match.slice(0,-1)}</span><span class="token-punctuation">:</span>`)
                    .replace(/grid;/g, '<span class="token-value">grid</span><span class="token-punctuation">;</span>')
                    .replace(/;/g, '<span class="token-punctuation">;</span>')
                    .replace(/{|}/g, match => `<span class="token-punctuation">${match}</span>`);
                window.rawCode = cssString;
            } else {
                codeContainer.innerHTML = htmlString
                    .replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/&lt;div|&lt;\/div&gt;/g, match => `<span class="token-property">${match}</span>`)
                    .replace(/class=/g, '<span class="token-selector">class=</span>')
                    .replace(/"grid-container"|"grid-item"/g, match => `<span class="token-value">${match}</span>`);
                window.rawCode = htmlString;
            }
        }

        function copyCode() {
            navigator.clipboard.writeText(window.rawCode);
            alert((activeTab === 'css' ? 'CSS' : 'HTML') + ' copied to clipboard!');
        }

        // Initialize
        renderTracks();
        updateGrid();
    </script>
</body>
</html>
