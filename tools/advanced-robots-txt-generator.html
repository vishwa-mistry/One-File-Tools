<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Robots.txt Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-base: #0b0f19;
        --bg-panel: #111827;
        --bg-input: #0f1219;
        --bg-card: #161e2e;
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
        --border-color: #374151;
        --primary: #10b981;
        --primary-hover: #059669;
        --danger: #ef4444;
        --focus-ring: rgba(16, 185, 129, 0.3);
        --header-border: #1f2937;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-base);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
        background-color: var(--bg-base);
        border-bottom: 1px solid var(--header-border);
      }

      .header-title {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 600;
        font-size: 1.1rem;
      }

      .icon {
        width: 24px;
        height: 24px;
        background: white;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: black;
        font-weight: bold;
      }

      .theme-toggle {
        background: none;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        padding: 0.5rem;
        border-radius: 6px;
        cursor: pointer;
      }

      main {
        display: flex;
        flex: 1;
        gap: 2rem;
        padding: 2rem;
        max-width: 1600px;
        margin: 0 auto;
        width: 100%;
      }

      @media (max-width: 1024px) {
        main {
          flex-direction: column;
        }
      }

      .left-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        max-width: 800px;
      }

      .right-panel {
        flex: 1;
        background: var(--bg-panel);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
      }

      .section-header h2 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }

      .section-header p {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin-bottom: 1.25rem;
      }

      .presets {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        padding: 0.4rem 0.8rem;
        border-radius: 20px;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-outline:hover {
        color: var(--text-main);
        border-color: var(--text-muted);
      }

      .btn-outline.danger {
        color: var(--danger);
        border-color: rgba(239, 68, 68, 0.3);
      }

      .btn-outline.danger:hover {
        border-color: var(--danger);
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-muted);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 0.75rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
      }

      input[type="text"] {
        width: 100%;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 0.75rem;
        border-radius: 6px;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px var(--focus-ring);
      }

      .btn-add {
        width: 100%;
        background: transparent;
        border: 1px dashed var(--border-color);
        color: var(--text-muted);
        padding: 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.875rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.2s;
      }

      .btn-add:hover {
        border-color: var(--text-muted);
        color: var(--text-main);
      }

      .rule-row {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
        align-items: center;
      }

      .toggle-btn {
        display: flex;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        overflow: hidden;
      }

      .toggle-option {
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--text-muted);
        transition: all 0.2s;
      }

      .toggle-option.active {
        background: var(--primary);
        color: white;
      }

      .toggle-option.active.disallow {
        background: var(--bg-panel);
        color: var(--text-main);
      }

      .icon-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0.5rem;
        border-radius: 4px;
      }

      .icon-btn:hover {
        color: var(--danger);
      }

      .editor-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border-color);
      }

      .editor-title {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 500;
        font-size: 0.875rem;
      }

      .editor-actions {
        display: flex;
        gap: 0.5rem;
      }

      .btn-action {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 0.4rem 0.75rem;
        border-radius: 4px;
        font-size: 0.875rem;
        cursor: pointer;
      }

      .btn-action.primary {
        background: white;
        color: black;
        border-color: white;
        font-weight: 500;
      }

      .btn-action:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .btn-action.primary:hover {
        background: #e5e7eb;
      }

      pre {
        padding: 1.5rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.875rem;
        line-height: 1.6;
        overflow-x: auto;
        color: #e5e7eb;
      }

      .token-comment {
        color: #6b7280;
        font-style: italic;
      }
      .token-key {
        color: #60a5fa;
        font-weight: 500;
      }
      .token-value {
        color: #fbbf24;
      }
      .token-path {
        color: #34d399;
      }

      .sitemap-row {
        margin-bottom: 0.5rem;
        display: flex;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-title">
        <div class="icon">🤖</div>
        Advanced Robots.txt Generator
      </div>
      <button class="theme-toggle">☼</button>
    </header>

    <main>
      <div class="left-panel">
        <div class="section-header">
          <h2>Configure Directives</h2>
          <p>Define crawling rules for search engine bots visually.</p>
          <div class="presets">
            <button class="btn-outline" onclick="applyPreset('allowAll')">Allow All</button>
            <button class="btn-outline" onclick="applyPreset('disallowAll')">Disallow All</button>
            <button class="btn-outline" onclick="applyPreset('standardSEO')">Standard SEO</button>
            <button class="btn-outline" onclick="applyPreset('wpBase')">WordPress Base</button>
            <button class="btn-outline danger" onclick="clearAll()">Clear All</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">🌐 GLOBAL CONFIGURATIONS</div>

          <div class="form-group">
            <label>Primary Host (Optional)</label>
            <input type="text" id="primaryHost" placeholder="e.g., www.example.com" oninput="generateCode()" />
          </div>

          <div class="form-group">
            <label>XML Sitemaps</label>
            <div id="sitemaps-container"></div>
            <button class="btn-add" onclick="addSitemap()">+ Add Sitemap URL</button>
          </div>
        </div>

        <div id="agents-container"></div>

        <button class="btn-add" style="background: var(--bg-card); border-color: var(--border-color)" onclick="addAgent()">+ Add New User-Agent Group</button>
      </div>

      <div class="right-panel">
        <div class="editor-header">
          <div class="editor-title">📄 robots.txt</div>
          <div class="editor-actions">
            <button class="btn-action" onclick="copyCode()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
              Copy
            </button>
            <button class="btn-action primary" onclick="downloadCode()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Download
            </button>
          </div>
        </div>
        <pre id="code-output"></pre>
      </div>
    </main>

    <script>
      function esc(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }

      let state = {
        host: "",
        sitemaps: [],
        agents: [
          {
            name: "*",
            delay: "",
            rules: [{ type: "Allow", path: "/" }]
          }
        ]
      };

      function renderSitemaps() {
        const container = document.getElementById("sitemaps-container");
        container.innerHTML = state.sitemaps
          .map(
            (sm, i) => `
                <div class="sitemap-row">
                    <input type="text" value="${sm}" placeholder="https://example.com/sitemap.xml" oninput="updateSitemap(${i}, this.value)">
                    <button class="icon-btn" onclick="removeSitemap(${i})">✕</button>
                </div>
            `
          )
          .join("");
      }

      function renderAgents() {
        const container = document.getElementById("agents-container");
        container.innerHTML = state.agents
          .map(
            (agent, agentIndex) => `
                <div class="card">
                    <div class="card-header" style="justify-content: space-between">
                        <span>👤 USER-AGENT GROUP</span>
                        ${agentIndex > 0 ? `<button class="icon-btn" onclick="removeAgent(${agentIndex})">✕</button>` : ""}
                    </div>
                    
                    <div class="form-group">
                        <label>User-Agent</label>
                        <input type="text" value="${esc(agent.name)}" placeholder="*" oninput="updateAgent(${agentIndex}, 'name', this.value)">
                    </div>

                    <div class="form-group">
                        <label>Crawl-Delay (seconds, optional)</label>
                        <input type="text" value="${esc(agent.delay)}" placeholder="e.g., 10" oninput="updateAgent(${agentIndex}, 'delay', this.value)">
                    </div>

                    <div class="form-group">
                        <label>Rules</label>
                        ${agent.rules
                          .map(
                            (rule, ruleIndex) => `
                            <div class="rule-row">
                                <div class="toggle-btn">
                                    <button class="toggle-option ${rule.type === "Allow" ? "active" : ""}" onclick="updateRuleType(${agentIndex}, ${ruleIndex}, 'Allow')">Allow</button>
                                    <button class="toggle-option ${rule.type === "Disallow" ? "active disallow" : ""}" onclick="updateRuleType(${agentIndex}, ${ruleIndex}, 'Disallow')">Disallow</button>
                                </div>
                                <input type="text" value="${esc(rule.path)}" placeholder="/" oninput="updateRulePath(${agentIndex}, ${ruleIndex}, this.value)">
                                <button class="icon-btn" onclick="removeRule(${agentIndex}, ${ruleIndex})">✕</button>
                            </div>
                        `
                          )
                          .join("")}
                        <button class="btn-add" style="margin-top: 0.5rem; padding: 0.5rem;" onclick="addRule(${agentIndex})">+ Add Rule</button>
                    </div>
                </div>
            `
          )
          .join("");
      }

      function updateState() {
        state.host = document.getElementById("primaryHost").value;
        renderSitemaps();
        renderAgents();
        generateCode();
      }

      window.addSitemap = () => {
        state.sitemaps.push("");
        updateState();
      };
      window.removeSitemap = (i) => {
        state.sitemaps.splice(i, 1);
        updateState();
      };
      window.updateSitemap = (i, val) => {
        state.sitemaps[i] = val;
        generateCode();
      };

      window.addAgent = () => {
        state.agents.push({ name: "", delay: "", rules: [{ type: "Disallow", path: "" }] });
        updateState();
      };
      window.removeAgent = (i) => {
        state.agents.splice(i, 1);
        updateState();
      };
      window.updateAgent = (i, field, val) => {
        state.agents[i][field] = val;
        generateCode();
      };

      window.addRule = (agentIndex) => {
        state.agents[agentIndex].rules.push({ type: "Disallow", path: "/" });
        updateState();
      };
      window.removeRule = (agentIndex, ruleIndex) => {
        state.agents[agentIndex].rules.splice(ruleIndex, 1);
        updateState();
      };
      window.updateRuleType = (agentIndex, ruleIndex, type) => {
        state.agents[agentIndex].rules[ruleIndex].type = type;
        updateState();
      };
      window.updateRulePath = (agentIndex, ruleIndex, path) => {
        state.agents[agentIndex].rules[ruleIndex].path = path;
        generateCode();
      };

      window.applyPreset = (type) => {
        state.sitemaps = [];
        document.getElementById("primaryHost").value = "";
        state.host = "";

        if (type === "allowAll") {
          state.agents = [{ name: "*", delay: "", rules: [{ type: "Allow", path: "/" }] }];
        } else if (type === "disallowAll") {
          state.agents = [{ name: "*", delay: "", rules: [{ type: "Disallow", path: "/" }] }];
        } else if (type === "standardSEO") {
          state.agents = [
            {
              name: "*",
              delay: "",
              rules: [
                { type: "Disallow", path: "/cgi-bin/" },
                { type: "Disallow", path: "/tmp/" },
                { type: "Disallow", path: "/admin/" }
              ]
            }
          ];
        } else if (type === "wpBase") {
          state.agents = [
            {
              name: "*",
              delay: "",
              rules: [
                { type: "Disallow", path: "/wp-admin/" },
                { type: "Allow", path: "/wp-admin/admin-ajax.php" }
              ]
            }
          ];
        }
        updateState();
      };

      window.clearAll = () => {
        state.sitemaps = [];
        state.host = "";
        document.getElementById("primaryHost").value = "";
        state.agents = [{ name: "", delay: "", rules: [] }];
        updateState();
      };

      window.generateCode = () => {
        const date = new Date().toUTCString();
        let raw = `# robots.txt generated by Advanced Robots.txt Generator\n# Generated: ${date}\n\n`;
        let html = `<span class="token-comment"># robots.txt generated by Advanced Robots.txt Generator</span>\n`;
        html += `<span class="token-comment"># Generated: ${date}</span>\n\n`;

        if (state.host) {
          raw += `Host: ${state.host}\n\n`;
          html += `<span class="token-key">Host:</span> <span class="token-value">${state.host}</span>\n\n`;
        }

        state.agents.forEach((agent) => {
          if (!agent.name) return;
          raw += `User-agent: ${agent.name}\n`;
          html += `<span class="token-key">User-agent:</span> <span class="token-value">${esc(agent.name)}</span>\n`;

          if (agent.delay) {
            raw += `Crawl-delay: ${agent.delay}\n`;
            html += `<span class="token-key">Crawl-delay:</span> <span class="token-value">${esc(agent.delay)}</span>\n`;
          }

          agent.rules.forEach((rule) => {
            if (!rule.path) return;
            raw += `${rule.type}: ${rule.path}\n`;
            html += `<span class="token-key">${esc(rule.type)}:</span> <span class="token-path">${esc(rule.path)}</span>\n`;
          });
          raw += "\n";
          html += "\n";
        });

        state.sitemaps.forEach((sm) => {
          if (!sm) return;
          raw += `Sitemap: ${sm}\n`;
          html += `<span class="token-key">Sitemap:</span> <span class="token-value">${esc(sm)}</span>\n`;
        });

        document.getElementById("code-output").innerHTML = html;
        window.rawCode = raw.trim();
      };

      window.copyCode = () => {
        navigator.clipboard.writeText(window.rawCode);
        alert("Copied to clipboard!");
      };

      window.downloadCode = () => {
        const a = document.createElement("a");
        a.href = "data:text/plain;charset=utf-8," + encodeURIComponent(window.rawCode);
        a.download = "robots.txt";
        a.click();
      };

      updateState();
    </script>
  </body>
</html>
