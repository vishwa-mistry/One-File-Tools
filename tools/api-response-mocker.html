<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Response Mocker</title>
    <style>
      /* * Premium Developer UI
       * Keeping it framework-free but using modern CSS (Grid, Variables, Smooth Transitions)
       */
      :root {
        --color-primary: #0969da;
        --color-primary-hover: #0353a4;
        --color-bg: #f6f8fa;
        --color-surface: #ffffff;
        --color-text: #1f2328;
        --color-text-muted: #656d76;
        --color-border: #d0d7de;
        --color-success: #1a7f37;
        --color-warning: #9a6700;
        --color-danger: #cf222e;
        --font-base: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
        --shadow-sm: 0 1px 3px rgba(31, 35, 40, 0.12);
        --shadow-md: 0 4px 6px rgba(31, 35, 40, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-base);
        background-color: var(--color-bg);
        color: var(--color-text);
        line-height: 1.5;
        padding: 2rem 1rem;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header h1 {
        font-size: 2.25rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 0.5rem;
      }

      header p {
        color: var(--color-text-muted);
        font-size: 1.1rem;
      }

      .dashboard {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      @media (min-width: 800px) {
        .dashboard {
          grid-template-columns: 350px 1fr;
        }
      }

      .card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 1.5rem;
        box-shadow: var(--shadow-sm);
      }

      .card-header {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 1.25rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--color-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        font-weight: 600;
        font-size: 0.85rem;
        margin-bottom: 0.4rem;
        color: var(--color-text);
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 0.5rem 0.75rem;
        font-family: var(--font-base);
        font-size: 0.9rem;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        background-color: var(--color-surface);
        transition: all 0.2s ease;
      }

      textarea {
        font-family: var(--font-mono);
        resize: vertical;
        min-height: 180px;
        line-height: 1.4;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
      }

      .grid-2-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 6px;
        border: 1px solid transparent;
        transition: all 0.2s;
        gap: 0.4rem;
      }

      .btn-primary {
        background-color: var(--color-success);
        color: #fff;
        width: 100%;
      }

      .btn-primary:hover {
        background-color: #146c2e;
      }

      .btn-secondary {
        background-color: var(--color-bg);
        color: var(--color-text);
        border-color: var(--color-border);
      }

      .btn-secondary:hover {
        background-color: #ebecf0;
      }

      .btn-danger {
        color: var(--color-danger);
        background: transparent;
        padding: 0.4rem;
      }

      .btn-danger:hover {
        background-color: #ffebe9;
      }

      /* Mock List Styles */
      .mock-item {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        margin-bottom: 1rem;
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .mock-item:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      .mock-header {
        background: var(--color-bg);
        padding: 0.75rem 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--color-border);
      }

      .method-badge {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 700;
        padding: 0.2rem 0.5rem;
        border-radius: 2rem;
        color: #fff;
      }

      .method-GET { background: var(--color-primary); }
      .method-POST { background: var(--color-success); }
      .method-PUT { background: var(--color-warning); }
      .method-DELETE { background: var(--color-danger); }
      .method-PATCH { background: #8250df; }

      .status-badge {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--color-text-muted);
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--color-success);
      }
      .status-4xx { background: var(--color-warning); }
      .status-5xx { background: var(--color-danger); }

      .mock-path {
        font-family: var(--font-mono);
        font-weight: 600;
        font-size: 0.9rem;
      }

      .mock-body {
        padding: 1rem;
      }

      .mock-meta {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.75rem;
        font-size: 0.8rem;
        color: var(--color-text-muted);
      }

      .mock-actions {
        display: flex;
        gap: 0.5rem;
      }

      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--color-text-muted);
      }

      /* Simulation Terminal */
      .terminal {
        background: #0d1117;
        color: #c9d1d9;
        font-family: var(--font-mono);
        padding: 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        overflow-x: auto;
        margin-top: 1rem;
        display: none;
        border: 1px solid #30363d;
      }
      
      .terminal.active {
        display: block;
      }

      .term-success { color: #3fb950; }
      .term-info { color: #58a6ff; }
      .term-muted { color: #8b949e; }
      
      .spinner {
        display: inline-block;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>API Response Mocker</h1>
        <p>Design, delay, and simulate custom JSON endpoints entirely in your browser.</p>
      </header>

      <main class="dashboard">
        <aside class="card">
          <div class="card-header">Configure Endpoint</div>
          <form id="mocker-form">
            <div class="form-group">
              <label for="endpoint-path">Route Path</label>
              <input type="text" id="endpoint-path" placeholder="/api/v2/users" required />
            </div>

            <div class="grid-2-col">
              <div class="form-group">
                <label for="http-method">Method</label>
                <select id="http-method">
                  <option value="GET">GET</option>
                  <option value="POST">POST</option>
                  <option value="PUT">PUT</option>
                  <option value="PATCH">PATCH</option>
                  <option value="DELETE">DELETE</option>
                </select>
              </div>
              <div class="form-group">
                <label for="status-code">Status</label>
                <input type="number" id="status-code" value="200" min="100" max="599" required />
              </div>
            </div>

            <div class="form-group">
              <label for="network-delay">Simulated Delay (ms)</label>
              <input type="number" id="network-delay" value="0" min="0" max="10000" step="100" />
            </div>

            <div class="form-group" style="margin-top: 1.5rem;">
              <div style="display: flex; justify-content: space-between; align-items: end;">
                <label for="json-response" style="margin: 0;">JSON Payload</label>
                <button type="button" class="btn btn-secondary" id="btn-format" style="padding: 0.2rem 0.5rem; font-size: 0.75rem;">Sort & Format</button>
              </div>
              <textarea id="json-response" style="margin-top: 0.5rem;" required>{
  "message": "success",
  "data": []
}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">Save Mock Endpoint</button>
          </form>
        </aside>

        <section class="card">
          <div class="card-header">
            <span>Active Mocks</span>
            <span id="mock-count" style="font-size: 0.85rem; color: var(--color-text-muted); font-weight: normal;">0 Endpoints</span>
          </div>
          
          <div id="mock-list">
            </div>
        </section>
      </main>
    </div>

    <script>
      /**
       * Core Configuration
       */
      const STORAGE_KEY = "oft_api_mocker_v2";
      
      // DOM Elements
      const form = document.getElementById("mocker-form");
      const pathInput = document.getElementById("endpoint-path");
      const methodInput = document.getElementById("http-method");
      const statusInput = document.getElementById("status-code");
      const delayInput = document.getElementById("network-delay");
      const jsonInput = document.getElementById("json-response");
      const mockList = document.getElementById("mock-list");
      const mockCount = document.getElementById("mock-count");
      
      // State
      let mocks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

      /**
       * Recursively sorts JSON keys to ensure deterministic output.
       */
      function sortJsonKeys(obj) {
        if (obj === null || typeof obj !== "object") return obj;
        if (Array.isArray(obj)) return obj.map(sortJsonKeys);
        
        return Object.keys(obj).sort().reduce((acc, key) => {
          acc[key] = sortJsonKeys(obj[key]);
          return acc;
        }, {});
      }

      /**
       * Validates and auto-formats the JSON input with strict 2-space indentation.
       */
      function formatAndSortInput() {
        const raw = jsonInput.value.trim();
        if (!raw) return true;
        try {
          const parsed = JSON.parse(raw);
          jsonInput.value = JSON.stringify(sortJsonKeys(parsed), null, 2);
          return true;
        } catch (error) {
          alert(`Invalid JSON Syntax.\n\n${error.message}`);
          return false;
        }
      }

      /**
       * Renders the Active Mocks list.
       */
      function renderMocks() {
        mockList.innerHTML = "";
        mockCount.innerText = `${mocks.length} Endpoint${mocks.length !== 1 ? 's' : ''}`;

        if (mocks.length === 0) {
          mockList.innerHTML = `
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.5; margin-bottom: 1rem;">
                <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M12 12v9"/>
                <path d="m8 17 4 4 4-4"/>
              </svg>
              <p>No endpoints configured.</p>
              <p style="font-size: 0.85rem; margin-top: 0.5rem;">Create a mock on the left to start simulating APIs.</p>
            </div>`;
          return;
        }

        mocks.forEach((mock, index) => {
          const statusClass = mock.status >= 500 ? 'status-5xx' : mock.status >= 400 ? 'status-4xx' : '';
          
          const item = document.createElement("div");
          item.className = "mock-item";
          item.innerHTML = `
            <div class="mock-header">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <span class="method-badge method-${mock.method}">${mock.method}</span>
                <span class="mock-path">${mock.path}</span>
              </div>
              <div class="status-badge">
                <div class="status-indicator ${statusClass}"></div>
                ${mock.status}
              </div>
            </div>
            <div class="mock-body">
              <div class="mock-meta">
                <span>Response Size: ${new Blob([mock.response]).size} bytes</span>
                <span>Latency: ${mock.delay}ms</span>
              </div>
              <div class="mock-actions">
                <button class="btn btn-secondary" onclick="runSimulation(${index})">
                  ▶ Run Request
                </button>
                <button class="btn btn-secondary" onclick="copyMockData(${index})">
                  Copy JSON
                </button>
                <button class="btn btn-danger" onclick="deleteMock(${index})" style="margin-left: auto;">
                  Delete
                </button>
              </div>
              <div id="terminal-${index}" class="terminal"></div>
            </div>
          `;
          mockList.appendChild(item);
        });
      }

      /**
       * Simulates an API fetch request with the configured delay.
       * Features a built-in terminal UI to display the mock transaction.
       */
      window.runSimulation = function(index) {
        const mock = mocks[index];
        const term = document.getElementById(`terminal-${index}`);
        term.classList.add('active');
        
        const timestamp = new Date().toISOString();
        term.innerHTML = `<span class="term-muted">[${timestamp}]</span> <span class="term-info">INIT</span> Fetching ${mock.path} <span class="spinner">⚙</span>`;

        setTimeout(() => {
          const size = new Blob([mock.response]).size;
          term.innerHTML = `
<span class="term-muted">[${timestamp}]</span> <span class="term-info">INIT</span> Fetching ${mock.path}
<span class="term-muted">[${new Date().toISOString()}]</span> <span class="term-success">DONE</span> ${mock.status} OK (${mock.delay}ms)
<span class="term-muted">Content-Type: application/json | Content-Length: ${size}</span>

${mock.response}
          `;
        }, mock.delay);
      };

      /**
       * Handle Form Submission
       */
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (!formatAndSortInput()) return;

        let pathStr = pathInput.value.trim();
        if (!pathStr.startsWith("/")) pathStr = "/" + pathStr;

        const newMock = {
          id: Date.now().toString(),
          path: pathStr,
          method: methodInput.value,
          status: parseInt(statusInput.value, 10),
          delay: parseInt(delayInput.value, 10) || 0,
          response: jsonInput.value,
        };

        const existingIndex = mocks.findIndex(m => m.path === newMock.path && m.method === newMock.method);
        if (existingIndex >= 0) {
          if (confirm("Endpoint conflict detected. Overwrite existing mock?")) {
            mocks[existingIndex] = newMock;
          } else return;
        } else {
          mocks.push(newMock);
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(mocks));
        form.reset();
        jsonInput.value = '{\n  "message": "success",\n  "data": []\n}';
        renderMocks();
      });

      document.getElementById("btn-format").addEventListener("click", formatAndSortInput);

      window.copyMockData = function (index) {
        navigator.clipboard.writeText(mocks[index].response)
          .then(() => alert("Payload copied to clipboard."))
          .catch(console.error);
      };

      window.deleteMock = function (index) {
        if (confirm("Permanently delete this mock?")) {
          mocks.splice(index, 1);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(mocks));
          renderMocks();
        }
      };

      // Boot
      renderMocks();
    </script>
  </body>
</html>
