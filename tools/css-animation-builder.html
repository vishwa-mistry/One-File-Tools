<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Animation Builder — One File Tools</title>
    <style>
      :root {
        --app-bg: #0d1117;
        --app-text: #c9d1d9;
        --app-primary: #58a6ff;
        --app-primary-hover: #79c0ff;
        --app-secondary: #21262d;
        --app-panel: #161b22;
        --app-border: #30363d;
        --accent-purple: #bc8cff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        background-color: var(--app-bg);
        color: var(--app-text);
        padding: 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
      }
      h1 {
        color: var(--app-primary);
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }

      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        width: 100%;
        max-width: 1200px;
      }

      @media (max-width: 768px) {
        main {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--app-panel);
        border: 1px solid var(--app-border);
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      h2 {
        font-size: 1.2rem;
        border-bottom: 1px solid var(--app-border);
        padding-bottom: 0.5rem;
      }

      .preview-container {
        height: 300px;
        background: var(--app-secondary);
        border: 1px dashed var(--app-border);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      #animTarget {
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, var(--app-primary), var(--accent-purple));
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      }

      .controls-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      label {
        font-size: 0.85rem;
        font-weight: bold;
        color: #8b949e;
        margin-bottom: 0.3rem;
        display: block;
      }
      input[type="number"],
      select {
        width: 100%;
        padding: 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--app-border);
        background: var(--app-bg);
        color: var(--app-text);
      }

      .keyframe-row {
        display: grid;
        grid-template-columns: 80px 1fr 40px;
        gap: 0.5rem;
        align-items: center;
        background: var(--app-secondary);
        padding: 0.75rem;
        border-radius: 6px;
        margin-bottom: 0.5rem;
      }

      .keyframe-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }

      .btn {
        background: var(--app-primary);
        color: #000;
        border: none;
        padding: 0.6rem 1.2rem;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }
      .btn:hover {
        background: var(--app-primary-hover);
      }
      .btn-secondary {
        background: var(--app-secondary);
        color: var(--app-primary);
        border: 1px solid var(--app-primary);
      }
      .btn-danger {
        background: #da3633;
        color: white;
        padding: 0.5rem;
      }

      pre {
        background: var(--app-bg);
        padding: 1rem;
        border-radius: 6px;
        border: 1px solid var(--app-border);
        overflow-x: auto;
        font-family: monospace;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>CSS Animation Builder</h1>
      <p>Visually create CSS animations and export keyframes without manually writing CSS.</p>
    </header>

    <main>
      <div class="panel">
        <h2>Live Preview</h2>
        <div class="preview-container">
          <div id="animTarget"></div>
        </div>

        <div class="controls-grid">
          <div>
            <label>Duration (s)</label>
            <input type="number" id="duration" value="2" step="0.1" oninput="updateAnimation()" />
          </div>
          <div>
            <label>Easing Function</label>
            <select id="easing" onchange="updateAnimation()">
              <option value="ease">ease</option>
              <option value="linear">linear</option>
              <option value="ease-in">ease-in</option>
              <option value="ease-out">ease-out</option>
              <option value="ease-in-out">ease-in-out</option>
            </select>
          </div>
          <div>
            <label>Iteration Count</label>
            <select id="iteration" onchange="updateAnimation()">
              <option value="infinite">infinite</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
          <div>
            <label>Direction</label>
            <select id="direction" onchange="updateAnimation()">
              <option value="normal">normal</option>
              <option value="reverse">reverse</option>
              <option value="alternate">alternate</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 1rem">
          <button class="btn" style="flex: 1" onclick="playAnimation()">Replay Animation</button>
        </div>
      </div>

      <div class="panel">
        <div class="keyframe-header">
          <h2>Timeline Editor</h2>
          <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem" onclick="addKeyframe()">+ Add Keyframe</button>
        </div>

        <div id="keyframesList"></div>

        <h2>Export</h2>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem">
          <button class="btn btn-secondary" onclick="copyCSS()" style="flex: 1">Copy CSS</button>
          <button class="btn btn-secondary" onclick="saveJSON()" style="flex: 1">Save JSON</button>
        </div>
        <pre id="codeOutput"></pre>
      </div>
    </main>

    <style id="dynamicStyles"></style>

    <script>
      let keyframes = [
        { percent: 0, css: "transform: scale(1) translateY(0px); opacity: 1;" },
        { percent: 50, css: "transform: scale(1.2) translateY(-30px); opacity: 0.8;" },
        { percent: 100, css: "transform: scale(1) translateY(0px); opacity: 1;" }
      ];

      function renderKeyframes() {
        const list = document.getElementById("keyframesList");
        list.innerHTML = "";

        // Sort by percent
        keyframes.sort((a, b) => a.percent - b.percent);

        keyframes.forEach((kf, index) => {
          const row = document.createElement("div");
          row.className = "keyframe-row";
          row.innerHTML = `
            <div style="display: flex; align-items: center; gap: 0.2rem;">
              <input type="number" value="${kf.percent}" min="0" max="100" onchange="updateKf(${index}, 'percent', this.value)">%
            </div>
            <input type="text" value="${kf.css}" placeholder="CSS Properties (e.g. opacity: 0;)" onchange="updateKf(${index}, 'css', this.value)">
            <button class="btn-danger" onclick="removeKf(${index})" style="border:none; border-radius:4px; cursor:pointer;">X</button>
          `;
          list.appendChild(row);
        });

        generateCSS();
      }

      window.addKeyframe = () => {
        keyframes.push({ percent: 50, css: "" });
        renderKeyframes();
      };

      window.removeKf = (index) => {
        keyframes.splice(index, 1);
        renderKeyframes();
      };

      window.updateKf = (index, field, value) => {
        if (field === "percent") value = parseInt(value) || 0;
        keyframes[index][field] = value;
        renderKeyframes(); // re-sorts and re-renders
      };

      function generateCSS() {
        const duration = document.getElementById("duration").value;
        const easing = document.getElementById("easing").value;
        const iteration = document.getElementById("iteration").value;
        const direction = document.getElementById("direction").value;

        let kfStr = `@keyframes customAnim {\n`;
        keyframes.forEach((kf) => {
          kfStr += `  ${kf.percent}% { ${kf.css} }\n`;
        });
        kfStr += `}`;

        const classStr = `.animated-element {\n  animation: customAnim ${duration}s ${easing} ${iteration} ${direction};\n}`;

        const fullCSS = `${kfStr}\n\n${classStr}`;
        document.getElementById("codeOutput").textContent = fullCSS;

        // Inject into page for live preview
        document.getElementById("dynamicStyles").textContent = fullCSS;
        playAnimation();
      }

      window.updateAnimation = generateCSS;

      window.playAnimation = () => {
        const el = document.getElementById("animTarget");
        el.className = "";
        void el.offsetWidth; // trigger reflow
        el.className = "animated-element";
      };

      window.copyCSS = () => {
        const css = document.getElementById("codeOutput").textContent;
        navigator.clipboard.writeText(css);
        alert("CSS Copied to clipboard!");
      };

      window.saveJSON = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(keyframes, null, 2));
        const a = document.createElement("a");
        a.href = dataStr;
        a.download = "animation.json";
        a.click();
      };

      // Initial render
      renderKeyframes();
    </script>
  </body>
</html>
