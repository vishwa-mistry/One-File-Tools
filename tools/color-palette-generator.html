<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Generator — One File Tools</title>
    <style>
      :root {
        --app-bg: #0d1117;
        --app-text: #c9d1d9;
        --app-primary: #58a6ff;
        --app-secondary: #21262d;
        --app-border: #30363d;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--app-bg);
        color: var(--app-text);
        text-align: center;
        padding: 2rem;
      }
      h1 {
        color: var(--app-primary);
        margin-bottom: 2rem;
      }
      .palette-container {
        display: flex;
        justify-content: center;
        gap: 1rem;
        height: 300px;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }
      .color-card {
        flex: 1;
        min-width: 100px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 1rem;
        transition: transform 0.2s;
        cursor: pointer;
        position: relative;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      .color-card:hover {
        transform: translateY(-5px);
      }
      .color-hex {
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 0.5rem;
        border-radius: 4px;
        font-weight: bold;
        font-family: monospace;
      }
      .controls {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 2rem;
      }
      button {
        background: var(--app-primary);
        color: #000;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
      }
      button:hover {
        opacity: 0.9;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--app-primary);
        color: black;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        font-weight: bold;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h1>Color Palette Generator</h1>
    <p style="margin-bottom: 2rem">Press SPACEBAR to generate a new palette. Click any color to copy the HEX code.</p>

    <div class="palette-container" id="palette"></div>

    <div class="controls">
      <button onclick="generatePalette()">Generate New Palette</button>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
      const container = document.getElementById("palette");
      const toast = document.getElementById("toast");

      function randomHex() {
        return (
          "#" +
          Math.floor(Math.random() * 16777215)
            .toString(16)
            .padStart(6, "0")
        );
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      function generatePalette() {
        container.innerHTML = "";
        for (let i = 0; i < 5; i++) {
          const hex = randomHex();
          const card = document.createElement("div");
          card.className = "color-card";
          card.style.backgroundColor = hex;
          card.innerHTML = `<span class="color-hex">${hex.toUpperCase()}</span>`;
          card.onclick = () => {
            navigator.clipboard.writeText(hex.toUpperCase());
            showToast(`Copied ${hex.toUpperCase()}!`);
          };
          container.appendChild(card);
        }
      }

      document.body.onkeyup = function (e) {
        if (e.keyCode == 32) generatePalette();
      };

      generatePalette();
    </script>
  </body>
</html>
