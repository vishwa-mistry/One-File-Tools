<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Difference Viewer & Formatter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap');

        :root {
            /* Dark Theme Colors */
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --added-bg: rgba(34, 197, 94, 0.15);
            --added-text: #4ade80;
            --removed-bg: rgba(239, 68, 68, 0.15);
            --removed-text: #f87171;
            --modified-bg: rgba(234, 179, 8, 0.15);
            --modified-text: #facc15;
            --header-bg: #0f172a;
            --toast-bg: #334155;
        }

        [data-theme="light"] {
            /* Light Theme Colors */
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #dc2626;
            --added-bg: rgba(34, 197, 94, 0.15);
            --added-text: #166534;
            --removed-bg: rgba(239, 68, 68, 0.15);
            --removed-text: #991b1b;
            --modified-bg: rgba(234, 179, 8, 0.15);
            --modified-text: #854d0e;
            --header-bg: #f1f5f9;
            --toast-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            font-family: 'Inter', sans-serif;
            background-color: var(--surface-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        button:hover {
            background-color: var(--border-color);
        }

        button.primary {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        button.primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .theme-toggle {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 8px;
            border-radius: 50%;
        }

        .theme-toggle:hover {
            background: var(--surface-color);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .workspace {
            display: flex;
            flex: 1;
            gap: 16px;
            min-height: 0; /* Important for flex-child scrolling */
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .panel-header {
            padding: 12px 16px;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .panel-actions {
            display: flex;
            gap: 8px;
        }

        .panel-actions button {
            padding: 4px 8px;
            font-size: 0.75rem;
            box-shadow: none;
        }

        textarea, .diff-output {
            flex: 1;
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text-color);
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            overflow: auto;
        }

        .diff-output {
            white-space: pre-wrap;
            word-break: break-all;
        }

        .error-message {
            color: var(--danger);
            font-size: 0.75rem;
            margin-top: 4px;
            display: none;
        }

        /* Diff Highlighting */
        .diff-line {
            display: block;
            padding: 2px 4px;
            border-radius: 3px;
            margin-bottom: 2px;
        }

        .added { 
            background-color: var(--added-bg); 
            color: var(--added-text);
        }
        .removed { 
            background-color: var(--removed-bg); 
            color: var(--removed-text);
            text-decoration: line-through;
        }
        .modified { 
            background-color: var(--modified-bg); 
            color: var(--modified-text);
        }
        
        .diff-icon {
            display: inline-block;
            width: 16px;
            font-weight: bold;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: var(--toast-bg);
            color: var(--text-color);
            padding: 12px 24px;
            border-radius: 6px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .legend {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="9" y1="15" x2="15" y2="15"></line>
            </svg>
            JSON Difference Viewer
        </h1>
        <div class="actions">
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--added-bg); border: 1px solid var(--added-text)"></div> Added
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--removed-bg); border: 1px solid var(--removed-text)"></div> Removed
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--modified-bg); border: 1px solid var(--modified-text)"></div> Modified
                </div>
            </div>
            
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme" title="Toggle Theme">
                <!-- Sun icon default -->
                <svg id="theme-icon" viewBox="0 0 24 24">
                    <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </button>
            <button class="primary" onclick="compareJSON()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Compare JSON
            </button>
        </div>
    </div>

    <div class="workspace">
        <!-- Original JSON Panel -->
        <div class="panel">
            <div class="panel-header">
                Original JSON
                <div class="panel-actions">
                    <button onclick="formatJSON('json1', 'error1')">Format & Validate</button>
                    <button onclick="clearText('json1', 'error1')">Clear</button>
                </div>
            </div>
            <textarea id="json1" placeholder="Paste original JSON object here...&#10;&#10;{&#10;  &quot;example&quot;: &quot;data&quot;&#10;}" spellcheck="false"></textarea>
            <div class="panel-header" style="background: transparent; border-top: 1px solid var(--border-color); border-bottom: none;">
                <div id="error1" class="error-message"></div>
            </div>
        </div>
        
        <!-- Modified JSON Panel -->
        <div class="panel">
            <div class="panel-header">
                Modified JSON
                <div class="panel-actions">
                    <button onclick="formatJSON('json2', 'error2')">Format & Validate</button>
                    <button onclick="clearText('json2', 'error2')">Clear</button>
                </div>
            </div>
            <textarea id="json2" placeholder="Paste modified JSON object here...&#10;&#10;{&#10;  &quot;example&quot;: &quot;new data&quot;&#10;}" spellcheck="false"></textarea>
            <div class="panel-header" style="background: transparent; border-top: 1px solid var(--border-color); border-bottom: none;">
                <div id="error2" class="error-message"></div>
            </div>
        </div>
        
        <!-- Result Panel -->
        <div class="panel">
            <div class="panel-header">
                Differences
                <div class="panel-actions">
                    <button onclick="copyResult()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        Copy Result
                    </button>
                </div>
            </div>
            <div id="result" class="diff-output"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>Copied to clipboard!</span>
    </div>

    <script>
        // Theme Toggle Logic
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            
            const icon = document.getElementById('theme-icon');
            if (newTheme === 'dark') {
                icon.innerHTML = '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';
            } else {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';
            }
        }

        function clearText(textareaId, errorId) {
            document.getElementById(textareaId).value = '';
            document.getElementById(errorId).style.display = 'none';
            document.getElementById('result').innerHTML = '';
        }

        // Format and Validate JSON
        function formatJSON(textareaId, errorId) {
            const textarea = document.getElementById(textareaId);
            const errorDiv = document.getElementById(errorId);
            
            if (!textarea.value.trim()) {
                errorDiv.innerText = 'Input is empty.';
                errorDiv.style.display = 'block';
                return null;
            }

            try {
                const parsed = JSON.parse(textarea.value);
                textarea.value = JSON.stringify(parsed, null, 2);
                errorDiv.style.display = 'none';
                return parsed;
            } catch (e) {
                errorDiv.innerText = 'Invalid JSON: ' + e.message;
                errorDiv.style.display = 'block';
                return null;
            }
        }

        // Core Comparison Logic
        function compareJSON() {
            const obj1 = formatJSON('json1', 'error1');
            const obj2 = formatJSON('json2', 'error2');
            
            const resultDiv = document.getElementById('result');

            if (!obj1 && document.getElementById('json1').value.trim()) return;
            if (!obj2 && document.getElementById('json2').value.trim()) return;

            if (!obj1 || !obj2) {
                resultDiv.innerHTML = '<span style="color: var(--text-muted)">Please enter valid JSON in both panels to compare.</span>';
                return;
            }

            resultDiv.innerHTML = generateDiffHTML(obj1, obj2);
        }

        function generateDiffHTML(obj1, obj2, indent = 0) {
            let html = '';
            const spaces = '  '.repeat(indent);
            
            if (typeof obj1 !== 'object' || typeof obj2 !== 'object' || obj1 === null || obj2 === null) {
                if (obj1 !== obj2) {
                    return `<span class="diff-line removed">${spaces}<span class="diff-icon">-</span> ${JSON.stringify(obj1)}</span>` +
                           `<span class="diff-line added">${spaces}<span class="diff-icon">+</span> ${JSON.stringify(obj2)}</span>`;
                }
                return `<span class="diff-line">${spaces}  ${JSON.stringify(obj1)}</span>`;
            }

            const isArray = Array.isArray(obj1) && Array.isArray(obj2);
            html += `<span class="diff-line">${spaces}${isArray ? '[' : '{'}</span>`;
            
            const keys = Array.from(new Set([...Object.keys(obj1), ...Object.keys(obj2)]));
            
            keys.forEach((key, index) => {
                const val1 = obj1[key];
                const val2 = obj2[key];
                const keyStr = isArray ? '' : `"${key}": `;
                const nextIndent = indent + 1;
                const nextSpaces = '  '.repeat(nextIndent);
                const comma = (index < keys.length - 1) ? ',' : '';

                if (!(key in obj1)) {
                    html += `<span class="diff-line added">${nextSpaces}<span class="diff-icon">+</span> ${keyStr}${JSON.stringify(val2)}${comma}</span>`;
                } else if (!(key in obj2)) {
                    html += `<span class="diff-line removed">${nextSpaces}<span class="diff-icon">-</span> ${keyStr}${JSON.stringify(val1)}${comma}</span>`;
                } else if (typeof val1 === 'object' && typeof val2 === 'object' && val1 !== null && val2 !== null) {
                    html += `<span class="diff-line">${nextSpaces}  ${keyStr}</span>`;
                    html += generateDiffHTML(val1, val2, nextIndent);
                } else if (val1 !== val2) {
                    html += `<span class="diff-line modified">${nextSpaces}<span class="diff-icon">~</span> ${keyStr}${JSON.stringify(val2)} (was ${JSON.stringify(val1)})${comma}</span>`;
                } else {
                    html += `<span class="diff-line">${nextSpaces}  ${keyStr}${JSON.stringify(val1)}${comma}</span>`;
                }
            });

            html += `<span class="diff-line">${spaces}${isArray ? ']' : '}'}</span>`;
            return html;
        }

        // Copy functionality with Toast
        function copyResult() {
            const resultText = document.getElementById('result').innerText;
            if (!resultText.trim()) return;

            navigator.clipboard.writeText(resultText).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            });
        }
        
        // Auto-format initial placeholder data if any
        window.addEventListener('DOMContentLoaded', () => {
            // Check system preference for theme initially
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                toggleTheme(); // switch to light
            }
        });
    </script>
</body>
</html>
