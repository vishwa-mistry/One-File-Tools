<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Closure Chronicles - One File Tools</title>
<style>
:root{--bg:#0a0e17;--surface:#111827;--surface-2:#1f2937;--border:#374151;--text:#e5e7eb;--muted:#9ca3af;--accent:#22d3ee;--accent-soft:rgba(34,211,238,0.12);--danger:#f87171;--danger-soft:rgba(248,113,113,0.15);--good:#34d399;--good-soft:rgba(52,211,153,0.15);--warning:#fbbf24;--font-mono:"Space Mono","Consolas",monospace;--font-sans:"Inter",system-ui,sans-serif;--radius:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;line-height:1.6;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
button:focus-visible,a:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.wrap{max-width:720px;margin:0 auto;padding:32px 20px 60px;width:100%}
.topbar{display:flex;align-items:center;justify-content:space-between;max-width:720px;margin:0 auto;padding:20px 20px 0}
.brand{font-family:var(--font-mono);font-size:12px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}
.progress-wrap{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap}
.progress-step{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--surface);transition:background .3s,border-color .3s}
.progress-step.done{background:var(--good);border-color:var(--good)}
.progress-step.current{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent-soft)}
.progress-step.wrong{background:var(--danger);border-color:var(--danger)}
.screen{animation:screenIn .4s ease both}
@keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hero{text-align:center;padding:40px 0 20px}
.hero-badge{font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.hero-title{font-family:var(--font-mono);font-size:clamp(30px,6vw,48px);color:var(--text);line-height:1.2;margin-bottom:12px;font-weight:700}
.hero-sub{color:var(--muted);font-size:15px;max-width:46ch;margin:0 auto 32px}
.code-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;font-family:var(--font-mono);font-size:14px;line-height:1.8;overflow-x:auto;margin-bottom:28px}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.option{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;text-align:left;color:var(--text);transition:border-color .15s,background .15s;font-family:var(--font-mono);font-size:14px;cursor:pointer;display:flex;align-items:center;gap:12px}
.option:hover{border-color:var(--accent);background:var(--surface-2)}
.option.selected{border-color:var(--accent);background:var(--accent-soft)}
.option.correct{border-color:var(--good);background:var(--good-soft)}
.option.wrong{border-color:var(--danger);background:var(--danger-soft)}
.option-letter{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);display:grid;place-items:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--muted)}
.option.selected .option-letter{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.option.correct .option-letter{background:var(--good);color:var(--bg);border-color:var(--good)}
.option.wrong .option-letter{background:var(--danger);color:var(--bg);border-color:var(--danger)}
.btn{padding:12px 24px;border:none;border-radius:var(--radius);font-family:var(--font-sans);font-size:14px;font-weight:600;transition:background .15s,transform .15s}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{filter:brightness(1.15)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.explanation{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:20px}
.explanation-title{font-family:var(--font-mono);font-size:13px;color:var(--accent);margin-bottom:8px;font-weight:700}
.explanation-text{font-size:14px;line-height:1.7;color:var(--muted)}
.hint-box{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px}
.hint-text{font-size:13px;color:var(--muted);font-family:var(--font-mono)}
.achievement{background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:16px 20px;text-align:center;margin-bottom:20px}
.achievement-title{color:var(--accent);font-family:var(--font-mono);font-size:12px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.achievement-desc{font-size:14px;color:var(--muted)}
.stats{display:flex;justify-content:center;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.stat{text-align:center}
.stat-value{font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.star-rating{display:flex;justify-content:center;gap:4px;font-size:24px;margin-bottom:16px}
.star{color:var(--muted);transition:color .3s}
.star.filled{color:var(--warning)}
.level-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;font-family:var(--font-mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px}
.confetti{position:fixed;pointer-events:none;animation:confetti-fall 3s ease-out forwards}
@keyframes confetti-fall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.timer{font-family:var(--font-mono);font-size:12px;color:var(--muted);text-align:center;margin-bottom:12px}
.final-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center;margin-bottom:20px}
.final-title{font-size:24px;font-weight:700;margin-bottom:8px}
.final-subtitle{color:var(--muted);margin-bottom:24px}
.badge-list{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.badge{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.badge.earned{border-color:var(--accent);color:var(--accent)}
.hidden{display:none}
@media(max-width:600px){.wrap{padding:20px 16px 40px}.hero-title{font-size:28px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const LEVELS=[
{level:1,title:"Global vs Local",category:"scope",code:"let x='global';\nfunction foo(){\n  let x='local';\n  return x;\n}\nfoo();",question:"What does foo() return?",options:["global","local","undefined","ReferenceError"],correct:1,explanation:"Inside foo(), the local variable x shadows the global x. The function returns 'local' because it uses its own x."},
{level:2,title:"Function Scope",category:"scope",code:"function counter(){\n  let count=0;\n  return function(){\n    return ++count;\n  };\n}\nconst c=counter();\nconsole.log(c());",question:"What does c() log first?",options:["0","1","undefined","NaN"],correct:1,explanation:"The inner function forms a closure over count. ++count pre-increments, so the first call returns 1."},
{level:3,title:"Block Scope with let",category:"scope",code:"let x=1;\nif(true){\n  let x=2;\n  console.log(x);\n}\nconsole.log(x);",question:"What is logged?",options:["2 then 2","2 then 1","1 then 2","undefined"],correct:1,explanation:"The let inside the if block creates a new x scoped to that block. The outer x remains 1. console logs 2 (block) then 1 (outer)."},
{level:4,title:"var Hoisting",category:"scope",code:"console.log(a);\nvar a=5;",question:"What is logged?",options:["5","undefined","ReferenceError","null"],correct:1,explanation:"var declarations are hoisted (moved to top) but initialized as undefined. So console.log(a) prints undefined before a=5."},
{level:5,title:"Closure Counter",category:"closure",code:"function makeCounter(){\n  let count=0;\n  return{\n    increment:function(){return++count;},\n    decrement:function(){return--count;},\n    get:function(){return count;}\n  };\n}\nconst c=makeCounter();\nc.increment();\nconsole.log(c.get());",question:"What is logged?",options:["0","1","2","undefined"],correct:1,explanation:"The returned object methods share the same closure over count. increment() sets count to 1, so get() returns 1."},
{level:6,title:"Private Variables",category:"closure",code:"function secret(){\n  const hidden='secret';\n  return function(){\n    return hidden;\n  };\n}\nconst getSecret=secret();\nconsole.log(getSecret());",question:"What is logged?",options:["secret","undefined","hidden","ReferenceError"],correct:0,explanation:"The inner function captures hidden in its closure. Even though secret() has finished, getSecret() can still access hidden."},
{level:7,title:"Loop with var",category:"scope",code:"for(var i=0;i&lt;3;i++){\n  setTimeout(()=>console.log(i),10);\n}",question:"What is logged, and how many times?",options:["0,1,2 (once each)","3,3,3 (three times)","0,1,2 (three times)","undefined"],correct:1,explanation:"var has function scope, not block scope. By the time setTimeout runs, the loop has finished and i=3. All three callbacks log 3."},
{level:8,title:"Loop with let",category:"scope",code:"for(let i=0;i&lt;3;i++){\n  setTimeout(()=>console.log(i),10);\n}",question:"What is logged?",options:["0,1,2","3,3,3","undefined","throws error"],correct:0,explanation:"let is block-scoped. Each iteration gets its own i in the closure, so callbacks log 0, 1, 2 respectively."},
{level:9,title:"Factory Function",category:"closure",code:"function makeMultiplier(factor){\n  return function(x){\n    return x*factor;\n  };\n}\nconst triple=makeMultiplier(3);\nconsole.log(triple(4));",question:"What is logged?",options:["7","12","4","undefined"],correct:1,explanation:"triple is a factory function that remembers factor=3 through closure. triple(4) returns 4*3=12."},
{level:10,title:"Callback Closure",category:"closure",code:"const fns=[];\nfor(let i=0;i&lt;3;i++){\n  fns.push(()=>i);\n}\nconsole.log(fns.map(f=>f()).join(','));",question:"What is logged?",options:["0,1,2","3,3,3","undefined","throws"],correct:0,explanation:"let creates a new binding per iteration. Each arrow function closes over its own i, so fns[0]()=0, fns[1]()=1, fns[2]()=2."}
];

const STORAGE_KEY="closure_chronicles_v1";

function loadProgress(){try{const saved=localStorage.getItem(STORAGE_KEY);if(saved){const data=JSON.parse(saved);return{currentLevel:data.currentLevel||0,mistakes:data.mistakes||0,hintsUsed:data.hintsUsed||0,startTime:data.startTime||Date.now(),completed:data.completed||false,badges:data.badges||[],stars:data.stars||0};}}catch(e){}return{currentLevel:0,mistakes:0,hintsUsed:0,startTime:Date.now(),completed:false,badges:[],stars:0}}

function saveProgress(){localStorage.setItem(STORAGE_KEY,JSON.stringify(progress))}

let progress=loadProgress();
let currentHint=null;
let selectedOption=null;
let hasAnswered=false;
let timerInterval;

function renderScreen(html){document.getElementById("app").innerHTML=html}

function escapeHtml(str){const div=document.createElement("div");div.textContent=str;return div.innerHTML}
function highlightCode(code){return code.replace(/const|let|var|function|return|if|for/g,'<span style="color:#c084fc">$&</span>').replace(/console\.log/g,'<span style="color:#60a5fa">$&</span>').replace(/'[^']*'/g,'<span style="color:#34d399">$&</span>').replace(/\b\d+\b/g,'<span style="color:#fbbf24">$&</span>')}

function renderProgress(){let html='<div class="progress-wrap">';LEVELS.forEach((_,i)=>{let cls='';if(i<progress.currentLevel)cls='done';else if(i===progress.currentLevel)cls='current';html+=`<div class="progress-step ${cls}"></div>`;});return html+'</div>'}

function renderTitle(){return`<div class="hero screen"><div class="hero-badge">JavaScript Fundamentals</div><h1 class="hero-title">Closure Chronicles</h1><p class="hero-sub">Test your understanding of closures and lexical scoping through 10 interactive puzzles</p><div class="actions"><button class="btn btn-primary" onclick="startGame()">Start Quest</button></div></div>`}

function startGame(){progress.currentLevel=0;progress.mistakes=0;progress.hintsUsed=0;progress.startTime=Date.now();progress.completed=false;saveProgress();renderLevel()}

function renderLevel(){const level=LEVELS[progress.currentLevel];if(!level)return renderFinal();let html=`<div class="wrap screen"><div class="topbar"><span class="brand">One File Tools</span></div>${renderProgress()}<div class="level-badge">Level ${level.level}/10 - ${level.category}</div><div class="timer" id="timer"></div><div class="code-block">${highlightCode(level.code)}</div><h2 style="font-size:18px;margin-bottom:16px;color:var(--text)">${level.question}</h2><div class="options">`;level.options.forEach((opt,i)=>{const letters=['A','B','C','D'];html+=`<button class="option" onclick="selectOption(${i})" id="opt-${i}"><span class="option-letter">${letters[i]}</span><span>${escapeHtml(opt)}</span></button>`;});html+=`</div><div id="hint-area"></div><div id="explanation-area"></div><div class="actions"><button class="btn btn-secondary" onclick="showHint()">Hint (-1 Star)</button><button class="btn btn-primary" onclick="submitAnswer()" id="submit-btn" disabled>Submit</button></div></div>`;renderScreen(html);startTimer()}

function startTimer(){clearInterval(timerInterval);const start=Date.now();timerInterval=setInterval(()=>{const elapsed=Math.floor((Date.now()-start)/1000);const el=document.getElementById("timer");if(el)el.textContent=`${Math.floor(elapsed/60)}:${(elapsed%60).toString().padStart(2,'0')}`},1000)}

function selectOption(index){if(hasAnswered)return;selectedOption=index;document.querySelectorAll('.option').forEach((el,i)=>{el.classList.toggle('selected',i===index)});document.getElementById('submit-btn').disabled=false}

function showHint(){if(hasAnswered||currentHint)return;const level=LEVELS[progress.currentLevel];const hint=getHint(level);document.getElementById('hint-area').innerHTML=`<div class="hint-box"><div class="hint-text">${hint}</div></div>`;currentHint=true;progress.hintsUsed++}

function getHint(level){const hints={scope:"Think about variable visibility and which function can see which variables.",closure:"A closure captures its surrounding scope. What variables does the inner function remember?","block-scope":"Block-scoped variables (let/const) are only accessible inside their block ({...})."};return hints[level.category]||"Read the code carefully and trace variable values."}

function submitAnswer(){if(hasAnswered||selectedOption===null)return;hasAnswered=true;const level=LEVELS[progress.currentLevel];const correct=selectedOption===level.correct;document.querySelectorAll('.option').forEach((el,i)=>{el.classList.remove('selected');if(i===level.correct)el.classList.add('correct');else if(i===selectedOption)el.classList.add('wrong');});document.getElementById('submit-btn').disabled=true;document.querySelectorAll('.option').forEach(el=>el.disabled=true);let html=`<div class="explanation"><div class="explanation-title">${correct?'Correct!':'Not quite.'}</div><div class="explanation-text">${level.explanation}</div></div>`;document.getElementById('explanation-area').innerHTML=html;if(!correct)progress.mistakes++;setTimeout(()=>{progress.currentLevel++;saveProgress();if(progress.currentLevel>=LEVELS.length){renderFinal()}else{currentHint=null;selectedOption=null;hasAnswered=false;renderLevel()}},correct?1500:3000)}

function renderFinal(){clearInterval(timerInterval);const totalTime=Math.floor((Date.now()-progress.startTime)/1000);const minutes=Math.floor(totalTime/60);const seconds=totalTime%60;const accuracy=Math.round(((LEVELS.length-progress.mistakes)/LEVELS.length)*100);const stars=calculateStars();progress.stars=stars;progress.completed=true;calculateBadges();saveProgress();let html=`<div class="wrap screen"><div class="final-card"><div class="hero-badge">Quest Complete</div><h1 class="final-title" style="color:var(--accent)">Closure Chronicles</h1><p class="final-subtitle">You conquered the mysteries of scope and closure</p><div class="star-rating">`;for(let i=0;i<3;i++){html+=`<span class="star ${i<stars?'filled':''}">★</span>`;}html+=`</div><div class="stats"><div class="stat"><div class="stat-value">${accuracy}%</div><div class="stat-label">Accuracy</div></div><div class="stat"><div class="stat-value">${progress.mistakes}</div><div class="stat-label">Mistakes</div></div><div class="stat"><div class="stat-value">${minutes}:${seconds.toString().padStart(2,'0')}</div><div class="stat-label">Time</div></div></div><div class="badge-list">`;const allBadges=getBadgeList();allBadges.forEach(b=>{html+=`<div class="badge ${progress.badges.includes(b.id)?'earned':''}">${b.name}</div>`;});html+=`</div><div class="actions"><button class="btn btn-primary" onclick="resetProgress()">Play Again</button><button class="btn btn-secondary" onclick="renderTitle()">Home</button></div></div></div>`;renderScreen(html);if(stars>=2)launchConfetti()}

function calculateStars(){let stars=1;if(progress.mistakes===0)stars=3;else if(progress.mistakes<=2)stars=2;return stars}

function calculateBadges(){const badges=[];if(progress.mistakes===0)badges.push('perfect');if(progress.hintsUsed===0)badges.push('no-hints');if(LEVELS.length-progress.mistakes>=7)badges.push('high-score');progress.badges=badges}

function getBadgeList(){return[{id:'perfect',name:'Flawless Run'},{id:'no-hints',name:'Pure Knowledge'},{id:'high-score',name:'Closure Master'}]}

function launchConfetti(){for(let i=0;i<30;i++){const c=document.createElement('div');c.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:-10px;width:10px;height:10px;background:hsl(${Math.random()*360},80%,60%);border-radius:50%;animation:confetti-fall ${2+Math.random()*2}s ease-out forwards`;document.body.appendChild(c);setTimeout(()=>c.remove(),4000)}}

function resetProgress(){progress.currentLevel=0;progress.mistakes=0;progress.hintsUsed=0;progress.startTime=Date.now();progress.completed=false;progress.badges=[];progress.stars=0;saveProgress();startGame()}

function init(){renderTitle()}
init();
</script>
</body>
</html>
