<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Bisect Detective - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0b0a0d;
        --surface: #16141a;
        --surface-2: #201d24;
        --border: #322e37;
        --text: #e9e2d3;
        --muted: #94897a;
        --accent: #e0a458;
        --accent-soft: rgba(224, 164, 88, 0.16);
        --danger: #a3402c;
        --danger-soft: rgba(163, 64, 44, 0.18);
        --good: #56796e;
        --good-soft: rgba(86, 121, 110, 0.18);
        --font-display: "Special Elite", cursive;
        --font-mono: "IBM Plex Mono", monospace;
        --font-sans: "Inter", system-ui, sans-serif;
        --radius: 8px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        background-image: radial-gradient(ellipse at 50% -10%, rgba(224, 164, 88, 0.08), transparent 60%);
        color: var(--text);
        font-family: var(--font-sans);
        min-height: 100vh;
        line-height: 1.5;
        scroll-behavior: smooth;
      }
      @media (prefers-reduced-motion: reduce) {
        body { scroll-behavior: auto; }
        * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
      }

      button { font-family: inherit; cursor: pointer; }
      button:focus-visible, a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

      .wrap { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }

      .screen { animation: screenIn 0.4s ease both; }
      @keyframes screenIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: none; }
      }

      /* ── Header ─────────────────────────────────── */
      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        max-width: 960px; margin: 0 auto; padding: 20px 20px 0;
      }
      .brand { font-family: var(--font-display); font-size: 15px; color: var(--muted); letter-spacing: 0.02em; }
      .case-notes-btn {
        background: var(--surface); border: 1px solid var(--border); color: var(--muted);
        width: 34px; height: 34px; border-radius: 50%; font-family: var(--font-display); font-size: 15px;
      }
      .case-notes-btn:hover { color: var(--accent); border-color: var(--accent); }

      /* ── Hero (title screen) ────────────────────── */
      .hero { text-align: center; padding: 20px 0 10px; }
      .hero-svg-wrap { max-width: 460px; margin: 0 auto 12px; }
      .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
      .title-main { font-family: var(--font-display); font-size: clamp(34px, 6vw, 54px); color: var(--text); line-height: 1.1; margin-bottom: 14px; }
      .title-sub { color: var(--muted); font-size: 15px; max-width: 46ch; margin: 0 auto 30px; }

      /* smoke */
      .smoke { animation: rise 4s ease-in infinite; transform-origin: center; }
      .smoke.s2 { animation-delay: 1.3s; }
      .smoke.s3 { animation-delay: 2.6s; }
      @keyframes rise {
        0% { transform: translate(0, 0) scale(0.6); opacity: 0; }
        15% { opacity: 0.5; }
        100% { transform: translate(6px, -70px) scale(1.3); opacity: 0; }
      }
      .chair-group { animation: sway 5s ease-in-out infinite; transform-origin: 240px 260px; }
      @keyframes sway {
        0%, 100% { transform: rotate(-1.4deg); }
        50% { transform: rotate(1.4deg); }
      }

      /* ── Difficulty cards ───────────────────────── */
      .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 720px; margin: 0 auto; }
      .diff-card {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 20px 16px; text-align: left; color: var(--text); transition: border-color 0.15s, transform 0.15s;
      }
      .diff-card:hover { border-color: var(--accent); transform: translateY(-2px); }
      .diff-card .dc-name { font-family: var(--font-display); font-size: 17px; margin-bottom: 6px; }
      .diff-card .dc-count { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 10px; }
      .diff-card .dc-desc { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
      .dc-best { margin-top: 10px; font-family: var(--font-mono); font-size: 11px; color: var(--accent); }

      /* ── Briefing ───────────────────────────────── */
      .briefing-card {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 28px; max-width: 640px; margin: 0 auto;
      }
      .briefing-card h2 { font-family: var(--font-display); font-size: 24px; margin-bottom: 14px; }
      .briefing-card p { color: var(--muted); font-size: 14.5px; margin-bottom: 14px; }
      .briefing-card .real-talk {
        background: var(--surface-2); border-left: 3px solid var(--accent); border-radius: 4px;
        padding: 12px 14px; font-size: 13.5px; color: var(--text); margin: 16px 0;
      }
      .briefing-diagram { display: flex; align-items: center; gap: 8px; margin: 18px 0; flex-wrap: wrap; }
      .briefing-diagram .bd-step { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
      .bd-boxes { display: flex; gap: 2px; }
      .bd-box { width: 8px; height: 16px; background: var(--border); border-radius: 2px; }
      .bd-box.cleared { background: transparent; border: 1px dashed var(--border); }
      .bd-arrow { color: var(--muted); }
      .btn {
        display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px;
        padding: 11px 22px; border-radius: 100px; border: 1px solid var(--accent);
        background: var(--accent); color: #1a1408; transition: background 0.15s, transform 0.1s;
      }
      .btn:hover { background: #eab873; transform: translateY(-1px); }
      .btn.ghost { background: transparent; color: var(--text); border-color: var(--border); }
      .btn.ghost:hover { border-color: var(--muted); }
      .center-btn-row { text-align: center; margin-top: 24px; }

      /* ── Case board ─────────────────────────────── */
      .case-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
      .case-title { font-family: var(--font-display); font-size: 20px; }
      .interrogation-count { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

      .halving-panel {
        display: flex; justify-content: space-between; align-items: center; gap: 12px;
        background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 12px 16px; margin: 14px 0 22px; font-family: var(--font-mono); font-size: 12.5px; flex-wrap: wrap;
      }
      .halving-panel b { color: var(--accent); }

      .lineup-label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; }
      .lineup {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; margin-bottom: 24px;
      }
      .suspect {
        aspect-ratio: 3/4; border-radius: 6px; border: 1px solid var(--border); background: var(--surface);
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
        font-family: var(--font-mono); font-size: 10px; color: var(--muted); position: relative; overflow: hidden;
        transition: all 0.25s ease;
      }
      .suspect.eliminated-good { background: var(--good-soft); border-color: var(--good); color: var(--good); opacity: 0.55; }
      .suspect.eliminated-bad { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); opacity: 0.55; }
      .suspect.active { cursor: pointer; }
      .suspect.active:hover { border-color: var(--accent); }
      .suspect.prime {
        border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 18px rgba(224, 164, 88, 0.35);
      }
      .suspect.prime::before {
        content: "PRIME"; position: absolute; top: 2px; font-size: 7px; color: var(--accent); letter-spacing: 0.05em;
      }
      .suspect .sid { font-size: 13px; color: var(--text); }
      .suspect.active .sid { color: var(--text); }

      .interrogation-panel {
        background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 22px; margin-top: 10px;
      }
      .interrogation-panel .ip-hash { font-family: var(--font-mono); font-size: 12px; color: var(--muted); margin-bottom: 8px; }
      .interrogation-panel .ip-report { font-size: 15px; margin-bottom: 18px; line-height: 1.55; }
      .decision-row { display: flex; gap: 10px; flex-wrap: wrap; }
      .decision-btn {
        flex: 1 1 180px; padding: 13px 16px; border-radius: var(--radius); font-weight: 600; font-size: 13.5px;
        border: 1px solid var(--border); background: var(--surface-2); color: var(--text); transition: all 0.15s;
      }
      .decision-btn:hover { transform: translateY(-1px); }
      .decision-btn.good-btn:hover { border-color: var(--good); background: var(--good-soft); }
      .decision-btn.bad-btn:hover { border-color: var(--danger); background: var(--danger-soft); }

      .stamp-reveal {
        text-align: center; padding: 26px 0; animation: stampIn 0.35s cubic-bezier(0.2, 1.4, 0.5, 1) both;
      }
      @keyframes stampIn {
        from { opacity: 0; transform: scale(1.6) rotate(-8deg); }
        to { opacity: 1; transform: scale(1) rotate(-4deg); }
      }
      .stamp-word { font-family: var(--font-display); font-size: 34px; letter-spacing: 0.05em; display: inline-block; border: 3px solid; padding: 8px 26px; border-radius: 4px; transform: rotate(-4deg); }
      .stamp-word.good-stamp { color: var(--good); border-color: var(--good); }
      .stamp-word.bad-stamp { color: var(--danger); border-color: var(--danger); }

      /* ── Closed screen ──────────────────────────── */
      .closed-wrap { text-align: center; max-width: 560px; margin: 0 auto; }
      .closed-wrap .culprit-tag { font-family: var(--font-mono); font-size: 12px; color: var(--muted); margin-bottom: 8px; }
      .closed-wrap h2 { font-family: var(--font-display); font-size: 28px; margin-bottom: 16px; }
      .confession-box {
        background: var(--surface); border: 1px solid var(--danger); border-radius: var(--radius);
        padding: 20px; text-align: left; margin-bottom: 20px;
      }
      .confession-box .cb-label { font-family: var(--font-mono); font-size: 10px; color: var(--danger); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
      .stat-row { display: flex; justify-content: center; gap: 26px; margin: 22px 0; flex-wrap: wrap; }
      .stat { text-align: center; }
      .stat .stat-num { font-family: var(--font-display); font-size: 26px; color: var(--accent); }
      .stat .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
      .rank-badge {
        display: inline-block; font-family: var(--font-display); font-size: 19px; color: var(--accent);
        border: 1px solid var(--accent); border-radius: 100px; padding: 8px 22px; margin-bottom: 8px;
      }

      /* ── Briefing modal overlay (in-game) ───────── */
      .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
      .overlay .briefing-card { max-height: 85vh; overflow-y: auto; width: 100%; }

      footer { text-align: center; padding: 30px 20px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
      footer a { color: var(--muted); border-bottom: 1px solid var(--border); }
      footer a:hover { color: var(--accent); border-color: var(--accent); }

      @media (max-width: 640px) {
        .diff-grid { grid-template-columns: 1fr; }
        .lineup { grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); }
        .decision-row { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <span class="brand">~/quests/git-bisect-detective</span>
      <button class="case-notes-btn" id="caseNotesBtn" title="Case Briefing" aria-label="Open case briefing" style="display:none">?</button>
    </div>

    <main class="wrap" id="app"></main>

    <footer>Part of <a href="https://github.com/praveenscience/One-File-Tools" target="_blank" rel="noopener">One File Tools</a></footer>

    <script>
      const $ = (id) => document.getElementById(id);
      const escapeHtml = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      const DIFFICULTIES = [
        { id: "cold-case", name: "Cold Case", count: 8, desc: "A quiet case, few suspects. Good for learning the ropes." },
        { id: "back-alley", name: "Back-Alley Mystery", count: 16, desc: "More suspects, more noise. Trust the process." },
        { id: "big-sleep", name: "The Big Sleep", count: 32, desc: "A sprawling case. Only the sharpest close this fast." },
      ];

      const FLAVOR_BANK = [
        "Witness reports the login button vanished around here.",
        "A janitor swears the checkout flow was fine until this point.",
        "The night-shift dev says nothing looked wrong when they left.",
        "Security footage shows a suspicious semicolon near this commit.",
        "The build server was unusually quiet the night of this change.",
        "An anonymous tip mentions a rogue CSS rule around this time.",
        "This commit's message is oddly vague: 'fix stuff'.",
        "The intern was seen near the config files that week.",
        "Logs show a spike in errors shortly after this point.",
        "A colleague recalls a 'quick fix' that was never reviewed.",
        "The commit description reads: 'should be fine now'.",
        "Someone left a coffee ring on the whiteboard near this date.",
        "The test suite went suspiciously green right around here.",
        "A merge happened late on a Friday, right before this window.",
        "This commit touches a file nobody remembers writing.",
        "The changelog is missing an entry for this exact day.",
        "A ticket was closed without explanation near this time.",
        "The deploy log shows a longer-than-usual build here.",
        "Someone renamed a variable and didn't tell anyone.",
        "This commit's diff is oddly large for a 'typo fix'.",
        "A stack trace once pointed vaguely at 'somewhere around here'.",
        "The QA report from that week has a suspicious blank page.",
        "This commit was pushed directly to main. No review.",
        "A comment says 'TODO: revisit this' and never was.",
        "The commit author has since left the company.",
        "Someone bypassed the linter right before this point.",
        "This commit references an issue number that doesn't exist.",
        "The staging environment behaved strangely after this.",
        "A rollback was attempted here, then quietly reverted again.",
        "This commit's timestamp is 3am. Nothing good happens at 3am.",
      ];

      const RANKS = [
        { max: 1.0, name: "Living Legend" },
        { max: 1.3, name: "Ace Detective" },
        { max: 1.6, name: "Private Eye" },
        { max: 2.0, name: "Beat Cop" },
        { max: Infinity, name: "Rookie" },
      ];

      const STORAGE_KEY = "gbd-progress";
      function loadProgress() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { return {}; }
      }
      function saveProgress(p) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch (e) {}
      }

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function randomHash() {
        return Array.from({ length: 7 }, () => "0123456789abcdef"[Math.floor(Math.random() * 16)]).join("");
      }

      function generateCase(n) {
        const boundary = 1 + Math.floor(Math.random() * (n - 1));
        const flavors = shuffle(FLAVOR_BANK).slice(0, n);
        const commits = [];
        for (let i = 0; i < n; i++) {
          commits.push({ index: i, hash: randomHash(), flavor: flavors[i], status: i < boundary ? "good" : "bad" });
        }
        return { commits, boundary };
      }

      function rankFor(interrogations, n) {
        const optimal = Math.ceil(Math.log2(n));
        const ratio = interrogations / optimal;
        return { rank: RANKS.find((r) => ratio <= r.max).name, optimal };
      }

      const state = { screen: "title", difficulty: null, game: null, revealed: null };

      function goTo(screen) {
        state.screen = screen;
        $("caseNotesBtn").style.display = screen === "board" ? "" : "none";
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function startCase(diff) {
        const gen = generateCase(diff.count);
        state.difficulty = diff;
        state.game = { ...gen, low: 0, high: diff.count - 1, interrogations: 0 };
        state.revealed = null;
        goTo("board");
      }

      function heroSVG() {
        return `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" style="overflow:visible" role="img" aria-label="Illustration of a detective interrogating a case at a desk, with an evidence board on the wall">
          <polygon points="0,300 400,300 400,170 0,200" fill="var(--surface-2)"/>

          <!-- Evidence corkboard -->
          <rect x="24" y="34" width="128" height="150" rx="3" fill="#3a2f24"/>
          <rect x="30" y="40" width="116" height="138" rx="2" fill="#4a3d2e"/>
          <g stroke="#a3402c" stroke-width="1" opacity="0.85">
            <line x1="52" y1="62" x2="118" y2="150"/>
            <line x1="118" y1="62" x2="52" y2="130"/>
            <line x1="52" y1="150" x2="130" y2="90"/>
          </g>
          <g>
            <polygon points="42,52 68,52 68,76 42,76" fill="#e9e2d3" transform="rotate(-6 55 64)"/>
            <polygon points="46,56 64,56 64,70 46,70" fill="#8a8272" transform="rotate(-6 55 64)"/>
            <polygon points="98,50 124,50 124,74 98,74" fill="#e9e2d3" transform="rotate(5 111 62)"/>
            <polygon points="102,54 120,54 120,68 102,68" fill="#7a7568" transform="rotate(5 111 62)"/>
            <polygon points="58,110 84,110 84,134 58,134" fill="#e9e2d3" transform="rotate(-4 71 122)"/>
            <polygon points="62,114 80,114 80,128 62,128" fill="#8f7a5c" transform="rotate(-4 71 122)"/>
            <polygon points="100,116 122,116 122,138 100,138" fill="#e9e2d3" transform="rotate(7 111 127)"/>
            <polygon points="103,120 119,120 119,132 103,132" fill="#6b6558" transform="rotate(7 111 127)"/>
            <circle cx="55" cy="64" r="2.2" fill="#a3402c"/>
            <circle cx="118" cy="62" r="2.2" fill="#a3402c"/>
            <circle cx="52" cy="130" r="2.2" fill="#a3402c"/>
            <circle cx="130" cy="90" r="2.2" fill="#a3402c"/>
          </g>

          <polygon points="170,60 400,10 400,170 190,170" fill="var(--accent-soft)" opacity="0.45"/>

          <!-- Desk -->
          <polygon points="150,300 400,300 380,190 130,190" fill="#1c1922"/>
          <polygon points="150,300 400,300 388,220 148,220" fill="#241f28"/>

          <g class="chair-group">
            <!-- Chair back + seat -->
            <polygon points="190,265 320,265 305,150 205,150" fill="#241f28"/>

            <!-- Torso / coat -->
            <polygon points="205,150 305,150 292,190 218,190" fill="#d9b48f"/>
            <polygon points="205,150 240,150 232,195 210,192" fill="#1c1922"/>
            <polygon points="270,150 305,150 300,192 278,195" fill="#1c1922"/>

            <!-- Neck -->
            <rect x="245" y="118" width="18" height="20" fill="#d9b48f"/>

            <!-- Head (angular low-poly, three-quarter view) -->
            <polygon points="228,70 262,66 278,90 274,118 256,132 236,126 224,104" fill="#d9b48f"/>
            <!-- brow shadow -->
            <polygon points="230,86 258,82 262,92 232,96" fill="#c49f76"/>
            <!-- nose -->
            <polygon points="272,92 282,100 272,106" fill="#c49f76"/>
            <!-- jaw shade -->
            <polygon points="236,110 262,106 256,128 240,122" fill="#c49f76"/>
            <!-- mustache -->
            <polygon points="252,108 274,106 270,114 250,114" fill="#241f28"/>
            <!-- eye -->
            <rect x="248" y="90" width="7" height="3" fill="#241f28"/>
            <!-- ear -->
            <polygon points="226,98 220,104 226,112" fill="#c49f76"/>

            <!-- Hat -->
            <polygon points="216,72 272,64 280,78 214,86" fill="#16141a"/>
            <polygon points="224,50 268,48 272,70 220,74" fill="#1e1c22"/>
            <polygon points="220,74 274,68 271,78 217,84" fill="#0c0b0d"/>

            <!-- Cigar + hand -->
            <polygon points="272,100 292,92 296,98 276,106" fill="#d9b48f"/>
            <line x1="292" y1="92" x2="302" y2="86" stroke="#a3402c" stroke-width="2.5" stroke-linecap="round"/>
          </g>

          <g opacity="0.75">
            <path class="smoke" d="M302,86 C305,74 297,68 302,56 C307,46 299,38 304,26" fill="none" stroke="#cfcac0" stroke-width="2.5" stroke-linecap="round"/>
            <path class="smoke s2" d="M302,86 C305,74 297,68 302,56 C307,46 299,38 304,26" fill="none" stroke="#cfcac0" stroke-width="2.5" stroke-linecap="round"/>
            <path class="smoke s3" d="M302,86 C305,74 297,68 302,56 C307,46 299,38 304,26" fill="none" stroke="#cfcac0" stroke-width="2.5" stroke-linecap="round"/>
          </g>
        </svg>`;
      }

      function renderTitle() {
        const progress = loadProgress();
        return `
          <div class="screen">
            <div class="hero">
              <div class="hero-svg-wrap">${heroSVG()}</div>
              <div class="eyebrow">Git & Version Control · Quest</div>
              <h1 class="title-main">Git Bisect Detective</h1>
              <p class="title-sub">A bug slipped into the codebase somewhere in the commit history. Interrogate suspects. Narrow the case. Catch the commit that did it.</p>
            </div>
            <div class="diff-grid">
              ${DIFFICULTIES.map((d) => `
                <button class="diff-card" data-diff="${d.id}">
                  <div class="dc-name">${d.name}</div>
                  <div class="dc-count">${d.count} suspects</div>
                  <div class="dc-desc">${d.desc}</div>
                  ${progress[d.id] ? `<div class="dc-best">Best: ${progress[d.id].rank} (${progress[d.id].interrogations} interrogations)</div>` : ""}
                </button>
              `).join("")}
            </div>
          </div>
        `;
      }

      function renderBriefing(fromBoard) {
        return `
          <div class="screen">
            <div class="briefing-card">
              <h2>Case Briefing</h2>
              <p>Somewhere in this commit history, one commit crossed the line — everything before it worked, everything after it (and including it) is broken. You know the first commit is clean and the last one is guilty. Your job is to find the exact line where things went wrong.</p>
              <p>Pick a suspect to interrogate. The case will reveal whether it's clean or guilty. Use that to narrow your search — commits before a clean one are cleared, commits from a guilty one onward stay under suspicion.</p>
              <div class="briefing-diagram">
                <div class="bd-step"><span class="bd-boxes">${Array.from({length:8}).map(()=>'<span class="bd-box"></span>').join("")}</span> 8 suspects</div>
                <span class="bd-arrow">→</span>
                <div class="bd-step"><span class="bd-boxes">${Array.from({length:4}).map(()=>'<span class="bd-box"></span>').join("")}${Array.from({length:4}).map(()=>'<span class="bd-box cleared"></span>').join("")}</span> 4 remain</div>
                <span class="bd-arrow">→</span>
                <div class="bd-step"><span class="bd-boxes">${Array.from({length:2}).map(()=>'<span class="bd-box"></span>').join("")}</span> 2 remain</div>
                <span class="bd-arrow">→</span>
                <div class="bd-step">Caught.</div>
              </div>
              <div class="real-talk">This is exactly how <code>git bisect</code> works. Instead of checking every commit one by one, it cuts the search in half each time — turning a hunt through hundreds of commits into a handful of steps. The suspect marked "Prime" each round is the one bisect itself would pick: right in the middle of what's left.</div>
              <div class="center-btn-row">
                <button class="btn" id="briefingContinueBtn">${fromBoard ? "Back to the case" : "Open the case file"}</button>
              </div>
            </div>
          </div>
        `;
      }

      function renderBoard() {
        const g = state.game;
        const activeLow = g.low, activeHigh = g.high;
        const mid = activeLow + Math.floor((activeHigh - activeLow) / 2);
        const optimal = Math.ceil(Math.log2(state.difficulty.count));

        const lineup = g.commits.map((c) => {
          let cls = "suspect";
          if (c.index <= g.low || c.index >= g.high) {
            if (c.index < g.low || (c.index === g.low && c.index !== 0 && c.status === "good")) cls += " eliminated-good";
          }
          if (c.index < g.low) cls += " eliminated-good";
          else if (c.index > g.high) cls += " eliminated-bad";
          else if (c.index === g.low) cls += " eliminated-good";
          else if (c.index === g.high) cls += " eliminated-bad";
          else {
            cls += " active";
            if (c.index === mid) cls += " prime";
          }
          const clickable = c.index > g.low && c.index < g.high;
          return `<div class="${cls}" ${clickable ? `data-idx="${c.index}"` : ""} title="${clickable ? "Interrogate this suspect" : "Cleared / confirmed"}">
            <span class="sid">#${c.index}</span>
            <span>${c.hash}</span>
          </div>`;
        }).join("");

        let interrogationPanel = "";
        if (state.revealed !== null) {
          const c = g.commits[state.revealed];
          interrogationPanel = `
            <div class="interrogation-panel">
              <div class="stamp-reveal">
                <span class="stamp-word ${c.status === "good" ? "good-stamp" : "bad-stamp"}">${c.status === "good" ? "CLEAN ALIBI" : "CAUGHT RED-HANDED"}</span>
              </div>
              <div class="center-btn-row"><button class="btn" id="continueRoundBtn">Continue the case</button></div>
            </div>
          `;
        } else {
          const midCommit = g.commits[mid];
          interrogationPanel = `
            <div class="interrogation-panel">
              <div class="ip-hash">Suspect #${mid} · ${midCommit.hash}</div>
              <div class="ip-report">"${escapeHtml(midCommit.flavor)}"</div>
              <p style="color:var(--muted);font-size:12.5px;margin-bottom:14px;">Choose any suspect above to interrogate — the one marked PRIME is where bisect itself would look first.</p>
            </div>
          `;
        }

        return `
          <div class="screen">
            <div class="case-header">
              <div class="case-title">${state.difficulty.name}</div>
              <div class="interrogation-count">Interrogation #${g.interrogations + (state.revealed !== null ? 0 : 1)} · Optimal: ${optimal}</div>
            </div>
            <div class="halving-panel">
              <span>Suspects remaining: <b>${g.high - g.low - 1}</b></span>
              <span>Range: <b>#${g.low}</b> (clean) → <b>#${g.high}</b> (guilty)</span>
            </div>
            <div class="lineup-label">The Lineup</div>
            <div class="lineup">${lineup}</div>
            ${interrogationPanel}
          </div>
        `;
      }

      function renderClosed() {
        const g = state.game;
        const culprit = g.commits[g.high];
        const { rank, optimal } = rankFor(g.interrogations, state.difficulty.count);

        return `
          <div class="screen closed-wrap">
            <div class="culprit-tag">Case #${state.difficulty.id.toUpperCase()}</div>
            <h2>Case Closed</h2>
            <div class="rank-badge">${rank}</div>
            <div class="confession-box">
              <div class="cb-label">Confession — Suspect #${culprit.index}, ${culprit.hash}</div>
              <div>"${escapeHtml(culprit.flavor)}"</div>
            </div>
            <div class="stat-row">
              <div class="stat"><div class="stat-num">${g.interrogations}</div><div class="stat-label">Interrogations</div></div>
              <div class="stat"><div class="stat-num">${optimal}</div><div class="stat-label">Optimal</div></div>
              <div class="stat"><div class="stat-num">${state.difficulty.count}</div><div class="stat-label">Total Suspects</div></div>
            </div>
            <div class="center-btn-row">
              <button class="btn" id="newCaseBtn">Open New Case</button>
            </div>
          </div>
        `;
      }

      function render() {
        const app = $("app");
        if (state.screen === "title") app.innerHTML = renderTitle();
        else if (state.screen === "briefing") app.innerHTML = renderBriefing(false);
        else if (state.screen === "board") app.innerHTML = renderBoard();
        else if (state.screen === "closed") app.innerHTML = renderClosed();
        wireEvents();
      }

      function wireEvents() {
        document.querySelectorAll(".diff-card").forEach((btn) => {
          btn.addEventListener("click", () => goTo("briefing") || (state._pendingDiff = DIFFICULTIES.find((d) => d.id === btn.dataset.diff)));
        });
        const briefingBtn = $("briefingContinueBtn");
        if (briefingBtn) {
          briefingBtn.addEventListener("click", () => {
            if (state._pendingDiff) { startCase(state._pendingDiff); state._pendingDiff = null; }
            else goTo("board");
          });
        }
        document.querySelectorAll(".suspect[data-idx]").forEach((el) => {
          el.addEventListener("click", () => interrogate(parseInt(el.dataset.idx, 10)));
        });
        const continueBtn = $("continueRoundBtn");
        if (continueBtn) continueBtn.addEventListener("click", advanceRound);
        const newCaseBtn = $("newCaseBtn");
        if (newCaseBtn) newCaseBtn.addEventListener("click", () => goTo("title"));
      }

      function interrogate(idx) {
        state.revealed = idx;
        render();
      }

      function advanceRound() {
        const g = state.game;
        const idx = state.revealed;
        const status = g.commits[idx].status;
        g.interrogations++;
        if (status === "good") g.low = idx; else g.high = idx;
        state.revealed = null;

        if (g.high - g.low === 1) {
          const { rank } = rankFor(g.interrogations, state.difficulty.count);
          const progress = loadProgress();
          const existing = progress[state.difficulty.id];
          if (!existing || g.interrogations < existing.interrogations) {
            progress[state.difficulty.id] = { rank, interrogations: g.interrogations };
            saveProgress(progress);
          }
          goTo("closed");
        } else {
          render();
        }
      }

      $("caseNotesBtn").addEventListener("click", () => {
        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.innerHTML = renderBriefing(true);
        document.body.appendChild(overlay);
        overlay.querySelector("#briefingContinueBtn").addEventListener("click", () => overlay.remove());
        overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
      });

      render();
    </script>
  </body>
</html>
