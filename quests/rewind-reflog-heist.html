<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rewind: A Reflog Heist - One File Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0a0d;
        --surface: #131318;
        --surface-2: #1b1b22;
        --border: #2a2a33;
        --text: #e8e6f0;
        --muted: #8b899c;
        --red: #e0273f;
        --red-soft: rgba(224, 39, 63, 0.15);
        --teal: #35c9c1;
        --teal-soft: rgba(53, 201, 193, 0.14);
        --amber: #e0a83c;
        --amber-soft: rgba(224, 168, 60, 0.15);
        --font-display: "Bebas Neue", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --font-sans: "Inter", system-ui, sans-serif;
        --radius: 10px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; } }

      body {
        background: var(--bg);
        background-image: radial-gradient(ellipse at 20% 0%, rgba(224, 39, 63, 0.07), transparent 55%), radial-gradient(ellipse at 80% 100%, rgba(53, 201, 193, 0.06), transparent 55%);
        color: var(--text); font-family: var(--font-sans); min-height: 100vh; line-height: 1.5;
      }
      button { font-family: inherit; cursor: pointer; }
      button:focus-visible, a:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
      h1, h2, h3, .brand { font-family: var(--font-display); letter-spacing: 0.02em; }

      .wrap { max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }
      .topbar { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto; padding: 20px 20px 0; }
      .brand { font-size: 22px; color: var(--red); }
      .manual-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 100px; padding: 8px 16px; font-size: 12.5px; font-weight: 600; }
      .manual-btn:hover { border-color: var(--teal); color: var(--teal); }

      .screen { animation: screenIn 0.35s ease both; }
      @keyframes screenIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

      /* Hero */
      .hero { text-align: center; padding: 10px 0 26px; }
      .hero-svg-wrap { max-width: 420px; margin: 0 auto 10px; }
      .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
      .title-main { font-size: clamp(42px, 8vw, 68px); color: var(--text); line-height: 1; margin-bottom: 10px; }
      .title-main .accent { color: var(--red); }
      .title-sub { color: var(--muted); font-size: 15px; max-width: 48ch; margin: 0 auto 28px; }

      .string { stroke: var(--red); stroke-width: 1.5; opacity: 0.85; }
      .pulse-dot { animation: dotPulse 2s ease-in-out infinite; transform-origin: center; }
      @keyframes dotPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      .scan-line { animation: scan 3s linear infinite; }
      @keyframes scan { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { transform: translateY(140px); opacity: 0; } }

      /* Job grid */
      .job-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .job-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: left; color: var(--text); transition: border-color 0.15s, transform 0.15s; }
      .job-card:hover { border-color: var(--teal); transform: translateY(-2px); }
      .job-card .jc-tag { font-family: var(--font-mono); font-weight: 700; font-size: 10.5px; letter-spacing: 0.12em; color: var(--amber); margin-bottom: 6px; }
      .job-card .jc-name { font-family: var(--font-display); font-size: 26px; letter-spacing: 0.02em; margin-bottom: 6px; }
      .job-card .jc-desc { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
      .jc-done { display: inline-block; margin-top: 10px; font-family: var(--font-mono); font-size: 11px; color: var(--teal); }

      /* Briefing */
      .briefing-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; max-width: 640px; margin: 0 auto; }
      .briefing-card h2 { font-size: 30px; margin-bottom: 14px; color: var(--red); }
      .briefing-card p { color: var(--muted); font-size: 14.5px; margin-bottom: 14px; }
      .real-talk { background: var(--teal-soft); border-left: 3px solid var(--teal); border-radius: 4px; padding: 12px 14px; font-size: 13.5px; color: var(--text); margin: 16px 0; }
      .btn { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; padding: 11px 22px; border-radius: 100px; border: 1px solid var(--red); background: var(--red); color: #fff; transition: background 0.15s, transform 0.1s; }
      .btn:hover { background: #c41f35; transform: translateY(-1px); }
      .btn.ghost { background: transparent; color: var(--text); border-color: var(--border); }
      .btn.ghost:hover { border-color: var(--muted); }
      .center-row { text-align: center; margin-top: 22px; }

      /* Job screen */
      .job-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
      .job-title { font-family: var(--font-display); font-size: 30px; letter-spacing: 0.02em; color: var(--red); }
      .risk-meter { display: flex; gap: 6px; align-items: center; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
      .risk-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--red); }
      .risk-dot.lost { background: var(--red); }

      .clue-box { background: var(--amber-soft); border-left: 3px solid var(--amber); border-radius: 4px; padding: 12px 14px; font-size: 13.5px; margin: 14px 0 20px; }

      .terminal { background: #060608; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
      .terminal-head { padding: 10px 16px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
      .reflog-entry {
        display: flex; gap: 12px; align-items: baseline; padding: 12px 16px; border-bottom: 1px solid var(--border);
        font-family: var(--font-mono); font-size: 12.5px; cursor: pointer; transition: background 0.15s;
      }
      .reflog-entry:last-child { border-bottom: none; }
      .reflog-entry:hover { background: var(--surface-2); }
      .reflog-entry.wrong-flash { animation: wrongFlash 0.5s ease; }
      @keyframes wrongFlash { 0%, 100% { background: transparent; } 30% { background: var(--red-soft); } }
      .reflog-entry.correct-flash { background: var(--teal-soft); }
      .re-ref { color: var(--teal); flex-shrink: 0; }
      .re-hash { color: var(--muted); flex-shrink: 0; }
      .re-action { color: var(--amber); flex-shrink: 0; }
      .re-msg { color: var(--text); }

      .feedback-banner {
        margin-top: 16px; padding: 14px 18px; border-radius: var(--radius); font-size: 14px; text-align: center;
        opacity: 0; transform: translateY(-6px); transition: all 0.25s ease;
      }
      .feedback-banner.show { opacity: 1; transform: none; }
      .feedback-banner.success { background: var(--teal-soft); color: var(--teal); border: 1px solid var(--teal); }
      .feedback-banner.fail { background: var(--red-soft); color: var(--red); border: 1px solid var(--red); }

      .extract-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-top: 16px; }
      .extract-panel .ep-label { font-family: var(--font-mono); font-size: 10px; color: var(--teal); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
      .cmd-choices { display: flex; flex-direction: column; gap: 8px; }
      .cmd-choice { text-align: left; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; font-family: var(--font-mono); font-size: 12.5px; color: var(--text); }
      .cmd-choice:hover { border-color: var(--teal); }

      .job-footer { display: flex; justify-content: space-between; margin-top: 18px; }

      /* Job complete */
      .complete-wrap { text-align: center; max-width: 560px; margin: 0 auto; }
      .complete-wrap h2 { font-size: 34px; color: var(--teal); margin-bottom: 14px; }
      .confession-box { background: var(--surface); border: 1px solid var(--teal); border-radius: var(--radius); padding: 20px; text-align: left; margin-bottom: 20px; font-family: var(--font-mono); font-size: 13px; }
      .confession-box .cb-label { font-family: var(--font-sans); font-size: 10px; color: var(--teal); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }

      .blown-wrap { text-align: center; max-width: 480px; margin: 40px auto 0; }
      .blown-wrap h2 { font-size: 30px; color: var(--red); margin-bottom: 12px; }
      .blown-wrap p { color: var(--muted); font-size: 14px; margin-bottom: 18px; }

      .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
      .overlay .briefing-card { max-height: 85vh; overflow-y: auto; width: 100%; }
      .manual-item { margin-bottom: 16px; }
      .manual-item .mi-cmd { font-family: var(--font-mono); color: var(--teal); font-size: 13px; margin-bottom: 4px; }
      .manual-item .mi-desc { color: var(--muted); font-size: 13px; }

      footer { text-align: center; padding: 26px 20px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
      footer a { color: var(--muted); }

      @media (max-width: 620px) {
        .job-grid { grid-template-columns: 1fr; }
        .reflog-entry { flex-wrap: wrap; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="brand">REWIND</span>
      <button class="manual-btn" id="manualBtn" style="display:none">Field Manual</button>
    </header>
    <main class="wrap" id="app"></main>
    <footer>Part of <a href="https://github.com/praveenscience/One-File-Tools" target="_blank" rel="noopener">One File Tools</a></footer>

    <script>
      const $ = (id) => document.getElementById(id);
      const escapeHtml = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const STORAGE_KEY = "rrh-progress";
      const loadProgress = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { return {}; } };
      const saveProgress = (p) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch (e) {} };

      const MANUAL = [
        { cmd: "git reflog", desc: "Shows a log of everywhere HEAD and branch tips have pointed, even commits no longer on any branch." },
        { cmd: "HEAD@{n}", desc: "A reference to where HEAD was n moves ago — HEAD@{0} is now, HEAD@{1} is one move back, etc." },
        { cmd: "git reset --hard HEAD@{n}", desc: "Moves the current branch back to that exact point in the reflog, discarding what came after." },
        { cmd: "git branch recovered HEAD@{n}", desc: "Creates a new branch at that reflog point without touching your current branch — the safer recovery option." },
        { cmd: "git checkout HEAD@{n}", desc: "Checks out that commit directly in a detached HEAD state, useful just to look before deciding." },
      ];

      function hash() { return Array.from({ length: 7 }, () => "0123456789abcdef"[Math.floor(Math.random() * 16)]).join(""); }

      const JOBS = [
        {
          id: "vanishing-branch", tag: "JOB 01", name: "The Vanishing Branch",
          desc: "A feature branch got deleted before merge. Find where it last stood.",
          briefing: "A teammate deleted 'feature/checkout-fix' before it was merged. The work still exists — Git never truly forgets until it garbage-collects. Scan the reflog and find the last point HEAD stood on that branch.",
          clue: "Look for the entry right before 'checkout: moving from feature/checkout-fix to main'.",
          entries: [
            { ref: "HEAD@{0}", action: "commit", msg: "update README" },
            { ref: "HEAD@{1}", action: "checkout", msg: "moving from feature/checkout-fix to main" },
            { ref: "HEAD@{2}", action: "commit", msg: "fix checkout validation bug", isTarget: true },
            { ref: "HEAD@{3}", action: "commit", msg: "wip: checkout validation" },
            { ref: "HEAD@{4}", action: "checkout", msg: "moving from main to feature/checkout-fix" },
          ],
          extract: "git branch recovered-checkout-fix HEAD@{2}",
        },
        {
          id: "reset-regret", tag: "JOB 02", name: "The Reset Regret",
          desc: "Someone ran reset --hard and wiped three good commits.",
          briefing: "A panicked 'git reset --hard HEAD~3' just erased three commits of real work. They're gone from the branch, but reflog remembers where HEAD was before the reset.",
          clue: "Find the entry immediately before the 'reset: moving to HEAD~3' line.",
          entries: [
            { ref: "HEAD@{0}", action: "reset", msg: "moving to HEAD~3" },
            { ref: "HEAD@{1}", action: "commit", msg: "add payment retry logic", isTarget: true },
            { ref: "HEAD@{2}", action: "commit", msg: "fix off-by-one in retry count" },
            { ref: "HEAD@{3}", action: "commit", msg: "add logging for retries" },
            { ref: "HEAD@{4}", action: "commit", msg: "initial payment handler" },
          ],
          extract: "git reset --hard HEAD@{1}",
        },
        {
          id: "friday-force-push", tag: "JOB 03", name: "Friday Force-Push",
          desc: "A force push on Friday overwrote a colleague's commits. Classic.",
          briefing: "Someone force-pushed over main late Friday. Your local reflog still has the pre-push state — but there are several decoy amend/rebase entries mixed in to throw you off.",
          clue: "The target is the last real commit before the first 'rebase' entry appears.",
          entries: [
            { ref: "HEAD@{0}", action: "rebase", msg: "finish rebase" },
            { ref: "HEAD@{1}", action: "commit (amend)", msg: "fix typo in commit message" },
            { ref: "HEAD@{2}", action: "rebase", msg: "start rebase onto origin/main" },
            { ref: "HEAD@{3}", action: "commit", msg: "add rate limiter middleware", isTarget: true },
            { ref: "HEAD@{4}", action: "commit", msg: "add rate limiter tests" },
            { ref: "HEAD@{5}", action: "commit", msg: "merge origin/main" },
          ],
          extract: "git branch recovered-ratelimiter HEAD@{3}",
        },
        {
          id: "detached-drift", tag: "JOB 04", name: "Detached Drift",
          desc: "Experimental work happened in detached HEAD state, then vanished.",
          briefing: "A colleague checked out an old commit directly (detached HEAD), made changes, committed them, then switched branches without saving the work anywhere. It's an orphaned commit, only visible in reflog.",
          clue: "Find the commit made while in detached HEAD, right before the checkout back to main.",
          entries: [
            { ref: "HEAD@{0}", action: "checkout", msg: "moving from a91f3c2 to main" },
            { ref: "HEAD@{1}", action: "commit", msg: "experimental: try new caching strategy", isTarget: true },
            { ref: "HEAD@{2}", action: "checkout", msg: "moving from main to a91f3c2" },
            { ref: "HEAD@{3}", action: "commit", msg: "add cache invalidation helper" },
            { ref: "HEAD@{4}", action: "commit", msg: "update cache docs" },
          ],
          extract: "git branch recovered-caching HEAD@{1}",
        },
        {
          id: "double-cross", tag: "JOB 05", name: "The Double Cross",
          desc: "Final job. Find the commit, then choose the right way to bring it back.",
          briefing: "This is the big one. Not only must you find the right reflog entry among heavy decoys — you also have to pick the correct recovery command. Pick wrong here and you could overwrite work all over again.",
          clue: "The target sits right before two consecutive amend entries — those are the decoys.",
          entries: [
            { ref: "HEAD@{0}", action: "commit (amend)", msg: "fix formatting" },
            { ref: "HEAD@{1}", action: "commit (amend)", msg: "fix formatting again" },
            { ref: "HEAD@{2}", action: "commit", msg: "add full auth refactor", isTarget: true },
            { ref: "HEAD@{3}", action: "reset", msg: "moving to HEAD~1" },
            { ref: "HEAD@{4}", action: "commit", msg: "wip auth refactor" },
          ],
          requiresCommandChoice: true,
          commandChoices: [
            { text: "git reset --hard HEAD@{2}", correct: false, why: "This rewrites your current branch entirely — risky if others rely on it." },
            { text: "git branch recovered-auth HEAD@{2}", correct: true, why: "Safely creates a new branch at that point without touching anything else." },
            { text: "git commit --amend", correct: false, why: "This only edits your most recent commit — it can't reach back into reflog history." },
          ],
        },
      ];

      const state = { screen: "select", job: null, riskLost: 0, revealedWrong: null, flashId: null, jobDone: false, awaitingCommand: false };

      function goSelect() { state.screen = "select"; $("manualBtn").style.display = "none"; render(); window.scrollTo({ top: 0, behavior: "smooth" }); }

      function openBriefing(jobId) {
        state.job = JOBS.find((j) => j.id === jobId);
        state.screen = "briefing";
        render();
      }

      function startJob() {
        state.riskLost = 0; state.revealedWrong = null; state.flashId = null; state.jobDone = false; state.awaitingCommand = false;
        state.screen = "job"; $("manualBtn").style.display = "";
        render();
      }

      function heroSVG() {
        function photo(x, y, rot, lineSeed) {
          const lines = Array.from({ length: 3 }).map((_, i) =>
            `<rect x="${x + 8}" y="${y + 40 + i * 8}" width="${30 - ((lineSeed + i * 7) % 14)}" height="2.5" fill="#9c98a8" opacity="0.6"/>`
          ).join("");
          return `
            <g transform="rotate(${rot} ${x + 30} ${y + 25})">
              <polygon points="${x},${y} ${x + 60},${y} ${x + 58},${y + 68} ${x + 2},${y + 66}" fill="#efeef2"/>
              <polygon points="${x + 6},${y + 6} ${x + 54},${y + 6} ${x + 52},${y + 34} ${x + 8},${y + 33}" fill="#8a8798"/>
              <polygon points="${x + 8},${y + 33} ${x + 52},${y + 34} ${x + 50},${y + 24} ${x + 10},${y + 23}" fill="#6f6c7c"/>
              ${lines}
              <circle cx="${x + 30}" cy="${y - 2}" r="4.5" fill="#c94c4c"/>
              <rect x="${x - 4}" y="${y + 4}" width="16" height="7" fill="#e0dfc9" opacity="0.75" transform="rotate(-25 ${x + 4} ${y + 7})"/>
            </g>
          `;
        }

        return `<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a red-string investigation board">
          <rect x="0" y="0" width="400" height="260" rx="6" fill="var(--surface)"/>
          <rect x="10" y="10" width="380" height="240" rx="4" fill="#241f1a"/>
          <g opacity="0.35">
            ${Array.from({ length: 60 }).map((_, i) => {
              const cx = 20 + (i % 12) * 32;
              const cy = 20 + Math.floor(i / 12) * 44;
              return `<circle cx="${cx}" cy="${cy}" r="1" fill="#3a3228"/>`;
            }).join("")}
          </g>
          <g class="pulse-dot"><circle cx="90" cy="70" r="4" fill="var(--red)"/></g>
          <g class="pulse-dot" style="animation-delay:0.6s"><circle cx="230" cy="60" r="4" fill="var(--red)"/></g>
          <g class="pulse-dot" style="animation-delay:1.2s"><circle cx="150" cy="160" r="4" fill="var(--red)"/></g>
          <g class="pulse-dot" style="animation-delay:0.3s"><circle cx="310" cy="140" r="4" fill="var(--red)"/></g>
          <g class="pulse-dot" style="animation-delay:0.9s"><circle cx="70" cy="190" r="4" fill="var(--red)"/></g>
          <line class="string" x1="90" y1="70" x2="230" y2="60"/>
          <line class="string" x1="230" y1="60" x2="150" y2="160"/>
          <line class="string" x1="150" y1="160" x2="310" y2="140"/>
          <line class="string" x1="90" y1="70" x2="70" y2="190"/>
          <line class="string" x1="70" y1="190" x2="150" y2="160"/>
          ${photo(60, 45, -3, 2)}
          ${photo(200, 35, 4, 5)}
          ${photo(120, 135, -2, 1)}
          ${photo(280, 115, 3, 6)}
          ${photo(40, 165, -4, 3)}
          <g transform="translate(295,175) rotate(-14)" opacity="0.85">
            <rect x="0" y="0" width="70" height="24" rx="2" fill="none" stroke="var(--red)" stroke-width="2"/>
            <text x="35" y="16" text-anchor="middle" font-family="Bebas Neue, sans-serif" font-size="13" letter-spacing="1" fill="var(--red)">CLASSIFIED</text>
          </g>
          <rect x="0" y="0" width="400" height="6" fill="var(--teal)" opacity="0.3" class="scan-line"/>
        </svg>`;
      }

      function renderSelect() {
        const progress = loadProgress();
        return `
          <div class="screen">
            <div class="hero">
              <div class="hero-svg-wrap">${heroSVG()}</div>
              <div class="eyebrow">Git & Version Control · Quest</div>
              <h1 class="title-main">REWIND<span class="accent">.</span></h1>
              <p class="title-sub">A Reflog Heist. Commits have gone missing — force-pushed over, reset away, deleted with their branch. Scan the reflog, find the real lead, extract it clean.</p>
            </div>
            <div class="job-grid">
              ${JOBS.map((j) => `
                <button class="job-card" data-job="${j.id}">
                  <div class="jc-tag">${j.tag}</div>
                  <div class="jc-name">${j.name}</div>
                  <div class="jc-desc">${j.desc}</div>
                  ${progress[j.id] ? `<div class="jc-done">✓ Job complete</div>` : ""}
                </button>
              `).join("")}
            </div>
          </div>
        `;
      }

      function renderBriefing() {
        const j = state.job;
        return `
          <div class="screen">
            <div class="briefing-card">
              <div class="eyebrow" style="color:var(--amber)">${j.tag} · CLASSIFIED</div>
              <h2>${j.name}</h2>
              <p>${j.briefing}</p>
              <div class="real-talk">This is exactly what <code>git reflog</code> is for — it's a private, local log of everywhere your HEAD has pointed, including commits that no longer belong to any branch. It's often the only way back after a mistake like a bad reset or force-push.</div>
              <div class="center-row">
                <button class="btn" id="startJobBtn">Start the job</button>
              </div>
            </div>
          </div>
        `;
      }

      function renderJob() {
        const j = state.job;
        const riskDots = Array.from({ length: 3 }).map((_, i) => `<span class="risk-dot ${i < state.riskLost ? "lost" : ""}"></span>`).join("");

        if (state.riskLost >= 3) {
          return `
            <div class="screen blown-wrap">
              <h2>COVER BLOWN</h2>
              <p>Too many false leads. The job's off — but the reflog doesn't disappear. Take another run at it.</p>
              <button class="btn" id="retryBtn">Retry job</button>
              <div style="margin-top:10px;"><button class="btn ghost" id="backToSelectBtn">← All jobs</button></div>
            </div>
          `;
        }

        if (state.jobDone) {
          const target = j.entries.find((e) => e.isTarget);
          return `
            <div class="screen complete-wrap">
              <h2>JOB COMPLETE</h2>
              <div class="confession-box">
                <div class="cb-label">Extracted</div>
                ${escapeHtml(j.extract)}
              </div>
              <button class="btn" id="nextJobBtn">Next job →</button>
            </div>
          `;
        }

        const entries = j.entries.map((e, i) => {
          const flashCls = state.flashId === i ? (e.isTarget ? "correct-flash" : "wrong-flash") : "";
          return `<div class="reflog-entry ${flashCls}" data-idx="${i}" title="${e.ref} = ${i} move(s) before now">
            <span class="re-ref">${e.ref}</span>
            <span class="re-hash">${hash()}</span>
            <span class="re-action">${e.action}:</span>
            <span class="re-msg">${escapeHtml(e.msg)}</span>
          </div>`;
        }).join("");

        let extraPanel = "";
        if (state.awaitingCommand) {
          extraPanel = `
            <div class="extract-panel">
              <div class="ep-label">Found it. Now — how do you extract it safely?</div>
              <div class="cmd-choices">
                ${j.commandChoices.map((c, i) => `<button class="cmd-choice" data-cmd="${i}">${escapeHtml(c.text)}</button>`).join("")}
              </div>
            </div>
          `;
        }

        return `
          <div class="screen">
            <div class="job-header">
              <div class="job-title">${j.name}</div>
              <div class="risk-meter">RISK ${riskDots}</div>
            </div>
            <div class="clue-box">🔍 ${escapeHtml(j.clue)}</div>
            <div class="terminal">
              <div class="terminal-head">$ git reflog</div>
              ${entries}
            </div>
            <div class="feedback-banner ${state.feedback ? "show " + state.feedback.type : ""}">${state.feedback ? state.feedback.text : ""}</div>
            ${extraPanel}
            <div class="job-footer"><button class="btn ghost" id="backToSelectBtn2">← All jobs</button><span></span></div>
          </div>
        `;
      }

      function renderManual() {
        return `
          <div class="overlay" id="manualOverlay">
            <div class="briefing-card">
              <h2 style="color:var(--teal)">Field Manual</h2>
              ${MANUAL.map((m) => `<div class="manual-item"><div class="mi-cmd">${escapeHtml(m.cmd)}</div><div class="mi-desc">${escapeHtml(m.desc)}</div></div>`).join("")}
              <div class="center-row"><button class="btn" id="closeManualBtn">Got it</button></div>
            </div>
          </div>
        `;
      }

      function render() {
        const app = $("app");
        if (state.screen === "select") app.innerHTML = renderSelect();
        else if (state.screen === "briefing") app.innerHTML = renderBriefing();
        else if (state.screen === "job") app.innerHTML = renderJob();
        wireEvents();
      }

      function wireEvents() {
        document.querySelectorAll(".job-card").forEach((btn) => btn.addEventListener("click", () => openBriefing(btn.dataset.job)));
        const startBtn = $("startJobBtn"); if (startBtn) startBtn.addEventListener("click", startJob);
        const retryBtn = $("retryBtn"); if (retryBtn) retryBtn.addEventListener("click", startJob);
        const backBtn = $("backToSelectBtn"); if (backBtn) backBtn.addEventListener("click", goSelect);
        const backBtn2 = $("backToSelectBtn2"); if (backBtn2) backBtn2.addEventListener("click", goSelect);
        const nextBtn = $("nextJobBtn");
        if (nextBtn) nextBtn.addEventListener("click", () => {
          const idx = JOBS.findIndex((j) => j.id === state.job.id);
          if (idx + 1 < JOBS.length) openBriefing(JOBS[idx + 1].id); else goSelect();
        });
        document.querySelectorAll(".reflog-entry").forEach((el) => {
          el.addEventListener("click", () => pickEntry(parseInt(el.dataset.idx, 10)));
        });
        document.querySelectorAll(".cmd-choice").forEach((el) => {
          el.addEventListener("click", () => pickCommand(parseInt(el.dataset.cmd, 10)));
        });
      }

      function pickEntry(idx) {
        const j = state.job;
        const entry = j.entries[idx];
        state.flashId = idx;

        if (entry.isTarget) {
          if (j.requiresCommandChoice) {
            state.awaitingCommand = true;
            state.feedback = { type: "success", text: "Correct lead. Choose your extraction method carefully." };
          } else {
            markJobDone();
          }
        } else {
          state.riskLost = Math.min(3, state.riskLost + 1);
          state.feedback = { type: "fail", text: "False lead — that's not it. Risk rising." };
        }
        render();
        setTimeout(() => { state.flashId = null; }, 500);
      }

      function pickCommand(i) {
        const choice = state.job.commandChoices[i];
        if (choice.correct) {
          markJobDone();
        } else {
          state.riskLost = Math.min(3, state.riskLost + 1);
          state.feedback = { type: "fail", text: choice.why };
          state.awaitingCommand = state.riskLost < 3;
          render();
        }
      }

      function markJobDone() {
        state.jobDone = true;
        state.feedback = null;
        const progress = loadProgress();
        progress[state.job.id] = true;
        saveProgress(progress);
        render();
      }

      $("manualBtn").addEventListener("click", () => {
        const div = document.createElement("div");
        div.innerHTML = renderManual();
        document.body.appendChild(div.firstElementChild);
        $("closeManualBtn").addEventListener("click", () => $("manualOverlay").remove());
      });

      render();
    </script>
  </body>
</html>
