<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strata: The Lost Commits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Almendra:wght@400;700&family=Almendra+SC&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --parch:#ecdfc0; --parch-dark:#d9c79b; --sand:#c9a866; --sand-dark:#9c7a44;
  --soil:#7a5734; --soil-dark:#4d3620; --soil-deep:#2e2013;
  --ink:#3a2a17; --ink-soft:#6b5738;
  --clay:#b5601f; --rust:#8f3a1f; --gold:#d9a441; --gold-bright:#f0c05e;
  --teal:#2f8f8a; --teal-glow:rgba(47,143,138,.18);
  --good:#4f8f3f; --good-glow:rgba(79,143,63,.18);
  --bad:#a13a22; --bad-glow:rgba(161,58,34,.2);
  --font-title:'Pirata One',serif;
  --font-body:'Almendra',serif;
  --font-caps:'Almendra SC',serif;
  --font-code:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--soil-deep);}
body{
  background:
    radial-gradient(ellipse at 50% -10%, #4a3420 0%, transparent 55%),
    linear-gradient(180deg,#3a2717 0%, #241708 100%);
  color:var(--parch); font-family:var(--font-body); min-height:100vh; line-height:1.6;
  overflow-x:hidden; position:relative;
}
button{font-family:inherit;cursor:pointer;color:inherit;background:none;border:none;}
button:focus-visible,input:focus-visible{outline:2px solid var(--gold-bright);outline-offset:2px;}
.wrap{max-width:860px;margin:0 auto;padding:26px 18px 60px;position:relative;z-index:2;}
.screen{animation:screenIn .45s ease both;}
@keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.btn svg, .guide-btn svg, .reset-btn svg, .tool-btn svg, .nudge-btn svg, .return-btn svg{display:inline-block;vertical-align:-3px;}
.btn svg{width:16px;height:16px;margin-right:7px;}

.relic-field{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.relic{position:absolute;opacity:.13;color:var(--sand);animation:drift 14s ease-in-out infinite;}
.relic svg{width:100%;height:100%;}
@keyframes drift{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(4deg);}}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  margin-bottom:14px;padding-bottom:14px;border-bottom:2px solid var(--sand-dark);border-image:repeating-linear-gradient(90deg,var(--sand-dark) 0 6px, transparent 6px 10px) 1;}
.brand{font-family:var(--font-title);font-size:22px;color:var(--gold-bright);letter-spacing:.03em;}
.brand span{color:var(--ink-soft);font-family:var(--font-caps);font-size:10.5px;display:block;letter-spacing:.22em;margin-top:2px;}
.hud-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.dial-wrap{display:flex;align-items:center;gap:9px;}
.dial{position:relative;width:52px;height:52px;flex-shrink:0;}
.dial svg{width:100%;height:100%;transform:rotate(-90deg);}
.dial-track{fill:none;stroke:rgba(0,0,0,.3);stroke-width:6;}
.dial-fill{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .6s ease, stroke .4s ease;}
.dial-vase{position:absolute;inset:0;display:grid;place-items:center;}
.dial-vase svg{width:22px;height:22px;margin:0;}
.dial-label{font-family:var(--font-caps);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
.reset-btn,.guide-btn{border:1px solid var(--sand-dark);background:rgba(0,0,0,.15);padding:7px 13px;font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink-soft);font-family:var(--font-caps);transition:border-color .15s,color .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.reset-btn:hover,.guide-btn:hover{border-color:var(--gold);color:var(--gold-bright);}
.guide-btn svg,.reset-btn svg{width:14px;height:14px;margin:0;}

.trail{position:relative;display:flex;justify-content:space-between;align-items:center;margin:6px 0 26px;padding:0 6px;}
.trail::before{content:"";position:absolute;top:50%;left:14px;right:14px;height:0;border-top:2px dashed var(--sand-dark);z-index:0;}
.pin{position:relative;z-index:1;width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  background:var(--soil);border:2px solid var(--sand-dark);display:grid;place-items:center;transition:background .3s,border-color .3s;}
.pin span{transform:rotate(45deg);font-family:var(--font-code);font-size:11px;color:var(--parch-dark);}
.pin.done{background:var(--good);border-color:#7fbf6a;}
.pin.done span{color:#0e1a08;}
.pin.current{background:var(--gold);border-color:var(--gold-bright);box-shadow:0 0 12px rgba(217,164,65,.5);animation:pinpulse 2.2s ease-in-out infinite;}
.pin.current span{color:#2e1c04;}
@keyframes pinpulse{50%{box-shadow:0 0 4px rgba(217,164,65,.3);}}

.hero{text-align:center;padding:10px 0 8px;}
.hero-svg{width:100%;max-width:780px;height:auto;margin:0 auto 22px;display:block;filter:drop-shadow(0 10px 26px rgba(0,0,0,.55));}
.hero-title{font-family:var(--font-title);font-size:clamp(38px,8vw,66px);color:var(--parch);letter-spacing:.02em;
  text-shadow:0 0 22px rgba(217,164,65,.35),2px 2px 0 rgba(0,0,0,.6);}
.hero-title em{color:var(--gold-bright);font-style:normal;}
.hero-sub{font-family:var(--font-caps);font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);margin:12px 0 22px;}
.hero-brief{max-width:58ch;margin:0 auto 30px;color:var(--parch-dark);font-size:15.5px;line-height:1.8;}
.hero-brief b{color:var(--gold-bright);}

.compass-needle{transform-origin:650px 40px;animation:needleSwing 5s ease-in-out infinite;}
@keyframes needleSwing{0%,100%{transform:rotate(15deg);}50%{transform:rotate(28deg);}}
.route-path{stroke-dasharray:900;stroke-dashoffset:900;animation:drawRoute 3.4s ease-out forwards .3s;}
@keyframes drawRoute{to{stroke-dashoffset:0;}}
.route-dot{opacity:0;animation:dotPop .4s ease forwards;}
.route-dot.d1{animation-delay:.9s;} .route-dot.d2{animation-delay:1.7s;} .route-dot.d3{animation-delay:2.4s;} .route-dot.d4{animation-delay:3.1s;}
@keyframes dotPop{from{opacity:0;transform:scale(0);}to{opacity:1;transform:scale(1);}}
.mote{animation:moteTwinkle 3s ease-in-out infinite;}
@keyframes moteTwinkle{0%,100%{opacity:.25;}50%{opacity:.85;}}
.shovel-glint{animation:glint 2.6s ease-in-out infinite;}
@keyframes glint{0%,100%{opacity:.15;}50%{opacity:.6;}}
.hero-bird{animation:birdBob 4s ease-in-out infinite;transform-origin:center;}
@keyframes birdBob{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-6px) rotate(-3deg);}}

.btn{font-family:var(--font-caps);font-size:14px;letter-spacing:.1em;text-transform:uppercase;padding:13px 28px;
  border:2px solid var(--sand-dark);background:rgba(0,0,0,.2);color:var(--parch);
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  transition:background .15s,border-color .15s,transform .1s; display:inline-flex; align-items:center; justify-content:center;}
.btn:hover{border-color:var(--gold);background:rgba(217,164,65,.12);transform:translateY(-1px);}
.btn-primary{background:var(--gold);border-color:var(--gold-bright);color:#2a1a04;font-weight:700;}
.btn-primary:hover{background:var(--gold-bright);}
.actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}

.brief-card{background:linear-gradient(180deg,#e7d9b3,#ddc99a);border:2px solid var(--sand-dark);border-radius:2px;
  padding:30px 32px;color:var(--ink);box-shadow:0 12px 30px rgba(0,0,0,.35);}
.brief-eyebrow{font-family:var(--font-code);font-size:11px;color:var(--rust);letter-spacing:.06em;margin-bottom:6px;}
.site-name{font-family:var(--font-title);font-size:32px;color:var(--ink);margin:4px 0 6px;}
.region-tag{display:inline-block;font-family:var(--font-caps);font-size:10.5px;letter-spacing:.18em;color:#fff;
  background:var(--rust);padding:4px 12px;margin-bottom:16px;}
.brief-text{color:var(--ink-soft);font-size:14.5px;line-height:1.75;margin-bottom:18px;}
.field-notes{background:rgba(0,0,0,.06);border-left:3px solid var(--rust);padding:14px 18px;margin-bottom:22px;}
.field-notes-title{font-family:var(--font-caps);font-size:11.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);margin-bottom:8px;}
.field-notes ul{list-style:none;}
.field-notes li{position:relative;padding-left:18px;margin-bottom:8px;color:var(--ink-soft);font-size:13.5px;line-height:1.6;}
.field-notes li::before{content:"✦";position:absolute;left:0;color:var(--gold);font-size:10px;top:3px;}

.howto{display:flex;gap:0;margin-bottom:16px;background:rgba(0,0,0,.22);border:1px solid var(--sand-dark);border-radius:3px;overflow:hidden;}
.howto-step{flex:1;padding:11px 14px;display:flex;align-items:center;gap:10px;}
.howto-step:not(:last-child){border-right:1px dashed var(--sand-dark);}
.howto-num{width:22px;height:22px;border-radius:50%;background:var(--gold);color:#2a1a04;font-family:var(--font-code);font-weight:700;
  font-size:12px;display:grid;place-items:center;flex-shrink:0;}
.howto-text{font-size:12.5px;color:var(--parch-dark);line-height:1.4;}
.howto-text b{color:var(--gold-bright);}
.howto-note{text-align:center;font-size:12px;color:var(--ink-soft);font-style:italic;margin:-8px 0 16px;}

.toolbelt{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;justify-content:center;
  background:rgba(0,0,0,.2);border:1px solid var(--sand-dark);padding:10px;border-radius:3px;}
.tool-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 14px;border:1px solid transparent;
  border-radius:2px;transition:background .15s,border-color .15s,transform .1s;min-width:78px;}
.tool-btn svg{width:24px;height:24px;color:var(--parch-dark);transition:color .15s;margin:0;}
.tool-btn span{font-family:var(--font-caps);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);}
.tool-btn:hover{background:rgba(255,255,255,.05);transform:translateY(-1px);}
.tool-btn.active{border-color:var(--gold);background:rgba(217,164,65,.14);}
.tool-btn.active svg{color:var(--gold-bright);}
.tool-btn.active span{color:var(--gold-bright);}
.tool-desc{text-align:center;font-family:var(--font-body);font-style:italic;font-size:13px;color:var(--gold-bright);
  min-height:20px;margin-bottom:18px;padding-top:8px;}

.site-label{font-family:var(--font-caps);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);
  margin-bottom:10px;text-align:center;}
.dig-grid{display:grid;gap:14px;margin:0 auto 26px;justify-content:center;}
.tile{position:relative;width:150px;height:110px;}
.tile-face{width:100%;height:100%;border-radius:4px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:8px;text-align:center;}
.tile-buried .tile-face{
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.06), transparent 60%),
    linear-gradient(160deg,var(--soil),var(--soil-dark));
  border:2px solid var(--soil-dark); box-shadow:inset 0 -6px 10px rgba(0,0,0,.4);
  cursor:pointer; transition:filter .15s, transform .1s;
}
.tile-buried .tile-face:hover{ filter:brightness(1.2); }
.tile-buried .tile-face:active{ transform:scale(.97); }
.tile-buried svg{width:30px;height:30px;color:rgba(236,223,192,.4);margin-bottom:4px;}
.tile-buried .peek{font-family:var(--font-code);font-size:9.5px;color:rgba(236,223,192,.35);letter-spacing:.05em;}
.tile-revealed .tile-face{
  background:linear-gradient(180deg,#e7d9b3,#ddc99a); border:2px solid var(--gold); color:var(--ink);
  box-shadow:0 4px 14px rgba(0,0,0,.3); cursor:default; animation:revealPop .35s ease both;
}
@keyframes revealPop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.tile-revealed .hash{font-family:var(--font-code);font-size:11px;color:var(--rust);margin-bottom:3px;}
.tile-revealed .msg{font-family:var(--font-body);font-size:12.5px;line-height:1.4;}
.tile.rot1 .tile-face{transform:rotate(-1.4deg);}
.tile.rot2 .tile-face{transform:rotate(1.6deg);}

.reword-overlay{position:absolute;inset:0;background:rgba(20,12,4,.94);border-radius:4px;z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:10px;}
.reword-overlay input{width:100%;font-family:var(--font-code);font-size:12px;background:var(--parch);color:var(--ink);
  border:1px dashed var(--teal);padding:6px 8px;text-align:center;}
.reword-overlay .ro-label{font-family:var(--font-caps);font-size:9.5px;letter-spacing:.1em;color:var(--gold-bright);text-transform:uppercase;}
.reword-overlay button{font-family:var(--font-caps);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
  background:var(--gold);color:#2a1a04;padding:5px 12px;border-radius:2px;}

.table-label{font-family:var(--font-caps);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);
  margin:26px 0 10px;text-align:center;}
.table-label::before,.table-label::after{content:"—";color:var(--sand-dark);margin:0 10px;}
.finds-table{min-height:88px;background:rgba(0,0,0,.18);border:1px dashed var(--sand-dark);border-radius:3px;
  display:flex;gap:10px;padding:12px;flex-wrap:wrap;align-items:flex-start;margin-bottom:10px;}
.finds-empty{width:100%;text-align:center;color:var(--ink-soft);font-style:italic;font-size:13px;align-self:center;padding:20px 0;}
.find-item{position:relative;width:190px;background:linear-gradient(180deg,#e7d9b3,#ddc99a);border:2px solid var(--sand-dark);
  border-radius:3px;padding:10px 12px 12px;color:var(--ink);animation:findIn .35s ease both;transition:box-shadow .2s,border-color .2s;}
@keyframes findIn{from{opacity:0;transform:translateY(-8px) scale(.94);}to{opacity:1;transform:none;}}
.find-item.flag-bad{border-color:var(--bad);box-shadow:0 0 0 3px var(--bad-glow);}
.find-item.flag-good{border-color:var(--good);box-shadow:0 0 0 3px var(--good-glow);}
.find-item[draggable="true"]{cursor:grab;}
.find-item.dragging{opacity:.4;}
.find-item.drag-over{outline:2px dashed var(--teal);}
.find-order{position:absolute;top:-9px;left:-9px;width:22px;height:22px;border-radius:50%;background:var(--rust);color:#fff;
  font-family:var(--font-code);font-size:11px;display:grid;place-items:center;border:2px solid var(--parch);}
.find-action-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.07);border:1px solid var(--sand-dark);
  border-radius:2px;padding:3px 8px;margin-bottom:7px;font-family:var(--font-caps);font-size:9.5px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--rust);}
.find-action-badge svg{width:12px;height:12px;margin:0;}
.find-hash{font-family:var(--font-code);font-size:10.5px;color:var(--rust);margin-bottom:3px;}
.find-msg{font-family:var(--font-body);font-size:13px;line-height:1.4;margin-bottom:6px;}
.find-merged{font-family:var(--font-body);font-size:11.5px;font-style:italic;color:var(--ink-soft);border-top:1px dashed var(--sand-dark);
  padding-top:5px;margin-top:2px;}
.find-nudges{display:flex;justify-content:space-between;margin-top:6px;gap:4px;}
.nudge-btn{font-family:var(--font-caps);font-size:11px;color:var(--ink-soft);border:1px solid var(--sand-dark);padding:2px 8px;border-radius:2px;}
.nudge-btn:hover{color:var(--gold-bright);border-color:var(--gold);}
.return-btn{width:100%;margin-top:7px;font-family:var(--font-caps);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--rust);border:1px dashed var(--rust);padding:5px 8px;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:5px;}
.return-btn svg{width:12px;height:12px;margin:0;}
.return-btn:hover{background:rgba(161,58,34,.08);}
.table-actions{display:flex;justify-content:center;margin-bottom:18px;}
.undo-btn{font-family:var(--font-caps);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);
  border:1px solid var(--sand-dark);background:rgba(0,0,0,.15);padding:7px 16px;border-radius:2px;display:inline-flex;align-items:center;gap:6px;}
.undo-btn svg{width:14px;height:14px;margin:0;}
.undo-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold-bright);}
.undo-btn:disabled{opacity:.35;cursor:not-allowed;}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:70;background:var(--soil-dark);
  border:1px solid var(--gold);color:var(--parch);font-family:var(--font-body);font-size:14px;padding:11px 22px;
  border-radius:3px;animation:toastIn .3s ease, toastOut .4s ease 2.2s forwards;box-shadow:0 8px 20px rgba(0,0,0,.4);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-8px);}}

.catalog-actions{display:flex;justify-content:center;gap:14px;margin:20px 0 6px;}
.feedback-msg{text-align:center;font-family:var(--font-body);font-style:italic;font-size:14px;color:var(--ink-soft);margin-bottom:14px;}
.feedback-msg.good{color:var(--good);}
.feedback-msg.bad{color:var(--bad);}

.seal-card{text-align:center;padding:50px 20px;}
.seal{display:inline-flex;align-items:center;justify-content:center;width:150px;height:150px;border-radius:50%;
  border:4px double var(--gold); color:var(--gold-bright); margin-bottom:22px; animation:sealStamp .5s cubic-bezier(.3,1.4,.6,1) both;}
.seal.bad{border-color:var(--bad);color:var(--bad);}
.seal svg{width:80px;height:80px;}
@keyframes sealStamp{from{transform:scale(2.4) rotate(-25deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.seal-title{font-family:var(--font-title);font-size:30px;color:var(--parch);margin-bottom:6px;}
.seal-sub{color:var(--ink-soft);font-style:italic;margin-bottom:26px;font-size:14.5px;}

.final-card{background:linear-gradient(180deg,#e7d9b3,#ddc99a);border:2px solid var(--sand-dark);border-radius:3px;
  padding:38px 30px;text-align:center;color:var(--ink);box-shadow:0 14px 34px rgba(0,0,0,.4);}
.medal{width:92px;height:92px;margin:0 auto 12px;}
.rank-name{font-family:var(--font-title);font-size:30px;margin-bottom:4px;color:var(--ink);}
.rank-sub{color:var(--ink-soft);font-style:italic;margin-bottom:24px;font-size:14px;}
.stat-row{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin-bottom:26px;}
.stat-value{font-family:var(--font-code);font-size:23px;color:var(--rust);}
.stat-label{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.14em;font-family:var(--font-caps);}
.field-guide-block{text-align:left;background:rgba(0,0,0,.06);border:1px solid var(--sand-dark);padding:18px 22px;margin-bottom:26px;}
.field-guide-block h3{font-family:var(--font-title);font-size:19px;color:var(--rust);margin-bottom:12px;text-align:center;}
.guide-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.guide-row svg{width:20px;height:20px;color:var(--rust);flex-shrink:0;margin-top:2px;}
.guide-row b{font-family:var(--font-caps);font-size:12.5px;letter-spacing:.06em;color:var(--ink);}
.guide-row div{font-size:12.5px;color:var(--ink-soft);line-height:1.55;}

.modal-backdrop{position:fixed;inset:0;background:rgba(15,9,3,.78);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px;animation:screenIn .2s ease;}
.modal-card{max-width:600px;width:100%;max-height:82vh;overflow-y:auto;background:linear-gradient(180deg,#e7d9b3,#ddc99a);
  border:2px solid var(--gold);border-radius:3px;padding:26px 28px;color:var(--ink);box-shadow:0 20px 50px rgba(0,0,0,.5);}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.modal-title{font-family:var(--font-title);font-size:26px;color:var(--rust);}
.modal-close{border:1px solid var(--sand-dark);padding:5px 12px;font-size:12px;color:var(--ink-soft);font-family:var(--font-caps);border-radius:2px;}
.modal-close:hover{border-color:var(--rust);color:var(--rust);}
.modal-tabs{display:flex;gap:8px;margin:14px 0 16px;}
.modal-tab{font-family:var(--font-caps);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;padding:7px 16px;

.modal-tab.active{border-color:var(--rust);color:var(--rust);background:rgba(143,58,31,.08);}

.dust-p{position:fixed;pointer-events:none;z-index:60;border-radius:50%;}

.gold-p{position:fixed;top:-8px;pointer-events:none;z-index:60;animation:goldFall linear forwards;}

const STORAGE_KEY = "strata_lost_commits_v5";
function freshProgress(){ return { siteIndex:0, preservation:100, mistakes:0 }; }
function loadProgress(){
  try{ const s = localStorage.getItem(STORAGE_KEY); if(s) return Object.assign(freshProgress(), JSON.parse(s)); }catch(e){}
  return freshProgress();
}
function saveProgress(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }catch(e){} }

function preservationPercent(){ return Math.max(0, progress.preservation); }
function vaseIcon(p){ if(p>=67) return I.vaseWhole; if(p>=34) return I.vaseCrack; return I.vaseBroken; }
function renderDial(){
  const p = preservationPercent();
  const r = 22, c = 2*Math.PI*r, offset = c*(1-p/100);
  let color = "var(--gold)";
  if(p<34) color = "var(--bad)"; else if(p<67) color="var(--clay)";
  return `<div class="dial-wrap">
    <div class="dial">
      <svg viewBox="0 0 52 52">
        <circle class="dial-track" cx="26" cy="26" r="${r}"/>
        <circle class="dial-fill" cx="26" cy="26" r="${r}" stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="dial-vase" style="color:${color}">${vaseIcon(p)}</div>
    </div>
    <span class="dial-label">Preservation<br>${p}%</span>
  </div>`;
}

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

function topbar(){
  return `<div class="topbar">
    <div class="brand">STRATA<span>THE LOST COMMITS — FIELD EXCAVATION</span></div>
    <div class="hud-right">
      ${renderDial()}
      <button class="guide-btn" onclick="openGuide()">${I.book}<span>Field Guide</span></button>
      <button class="reset-btn" onclick="restartCurrentSite()">Reset Dig</button>
    </div>
  </div>`;
}
function trail(){
  let h = '<div class="trail">';
  SITES.forEach((s,i)=>{
    let cls=""; if(i<progress.siteIndex) cls="done"; else if(i===progress.siteIndex) cls="current";
    h += `<div class="pin ${cls}"><span>${i+1}</span></div>`;
  });
  return h + "</div>";
}

  </div>
  <div class="concept-block">
    <b>Your Trowel</b> is <code>pick</code> — keep a commit untouched. <b>Chisel &amp; Ink</b> is <code>reword</code> — keep the commit but rewrite its message. <b>Resin Bond</b> is <code>squash</code> — combine a commit into the one above it, keeping both messages. <b>Quick Patch</b> is <code>fixup</code> — same fold-in, but the message is thrown away, for trivial corrections. <b>Sledgehammer</b> is <code>drop</code> — the commit is deleted from history as if it never existed.
  </div>
  <div class="concept-block">
    <b>Fixing a mistake.</b> Every fragment on your Finds Table has its own "Return to Site" button — it sends just that one fragment back to the dig grid, still buried, so you can re-click it with a different tool. Nothing else on your table is affected.
  </div>`;
}
function guideModalHtml(){
  return `<div class="modal-backdrop" onclick="if(event.target===this) closeGuide()">
    <div class="modal-card">
      <div class="modal-head"><div class="modal-title">The Archivist's Guide</div><button class="modal-close" onclick="closeGuide()">Close ✕</button></div>
      <div class="modal-tabs">
        <button class="modal-tab ${guideTab==='tools'?'active':''}" onclick="switchGuideTab('tools')">Dig Tools</button>
        <button class="modal-tab ${guideTab==='concept'?'active':''}" onclick="switchGuideTab('concept')">Git Concept</button>
      </div>
      <div id="guide-body">${guideTab==='tools' ? guideToolsContent() : guideConceptContent()}</div>
    </div>
  </div>`;
}
function openGuide(){
  const d = document.createElement("div");
  d.id = "guide-overlay";
  d.innerHTML = guideModalHtml();
  document.body.appendChild(d);
}
function closeGuide(){ const d = document.getElementById("guide-overlay"); if(d) d.remove(); }
function switchGuideTab(tab){
  guideTab = tab;
  const overlay = document.getElementById("guide-overlay");
  if(overlay) overlay.innerHTML = guideModalHtml();
}

function renderTitle(){
  el(`<div class="wrap"><div class="hero screen">
    ${HERO_SVG}
    <h1 class="hero-title">STRATA: THE <em>LOST COMMITS</em></h1>
    <p class="hero-sub">A Field Excavation of Version History</p>
    <p class="hero-brief">Four sites, each hiding a scattered commit history beneath the soil. Pick a dig tool, then click a buried tile to act on it — lift it clean, bond it to your last find, patch it silently, re-carve its worn inscription, or shatter it for good. Arrange what survives on your Finds Table in the order it truly happened. Every card can be returned to the site and redone.</p>
    <div class="actions">
      <button class="btn btn-primary" onclick="startGame()">Begin the Dig</button>
      <button class="btn" onclick="openGuide()">${I.book}Open Archivist's Guide</button>
    </div>
  </div></div>`);
  renderRelicField();
}

function startGame(){
  progress = freshProgress();
  saveProgress();
  renderBrief();
}

function renderBrief(){
  const site = currentSite();
  el(`<div class="wrap screen">
    ${topbar()}
    ${trail()}
    <div class="brief-card">
      <div class="brief-eyebrow">SITE SURVEY — ${progress.siteIndex+1} OF ${SITES.length}</div>
      <div class="site-name">${site.name}</div>
      <div class="region-tag">${site.region}</div>
      <p class="brief-text">${site.briefing}</p>
      <div class="field-notes">
        <div class="field-notes-title">Field Notes</div>
        <ul>${site.notes.map(n=>`<li>${n}</li>`).join("")}</ul>
      </div>
      <div class="actions"><button class="btn btn-primary" onclick="beginSite()">Break Ground</button></div>
    </div>
  </div>`);
  renderRelicField();
}

function restartCurrentSite(){ beginSite(); }

function beginSite(){
  excavated = new Set();
  shelf = [];
  history = [];
  activeTool = "pick";
  rewordTargetId = null;
  renderDigScreen();
}

function toolbeltHtml(){
  return `<div class="howto">
    <div class="howto-step"><div class="howto-num">1</div><div class="howto-text">Click a <b>buried tile</b> to read it first — reading is free.</div></div>
    <div class="howto-step"><div class="howto-num">2</div><div class="howto-text">Pick the matching <b>tool</b>, then click that same tile again.</div></div>
    <div class="howto-step"><div class="howto-num">3</div><div class="howto-text">Arrange your <b>Finds Table</b>, then Catalog.</div></div>
  </div>
  <div class="toolbelt">${TOOLS.map(t=>
    `<button class="tool-btn ${t.id===activeTool?'active':''}" onclick="selectTool('${t.id}')">${t.icon}<span>${t.label}</span></button>`
  ).join("")}</div>
  <div class="tool-desc">${TOOLS.find(t=>t.id===activeTool).desc}</div>`;
}

function digGridHtml(site){
  const rot = ["","rot1","rot2"];
  let h = `<div class="dig-grid" style="grid-template-columns:repeat(${site.cols}, 150px)">`;
  site.commits.forEach((c, i)=>{
    const isExcavated = excavated.has(c.id);
    h += `<div class="tile ${rot[i % rot.length]} ${isExcavated ? 'tile-revealed' : 'tile-buried'}" id="tile-${c.id}" data-id="${c.id}">
      ${isExcavated ? `
        <div class="tile-face" id="face-${c.id}">
          <div class="hash">${c.hash}</div>
          <div class="msg">${escapeHtml(c.message)}</div>
        </div>` : `
        <div class="tile-face" id="face-${c.id}" onclick="handleTileClick('${c.id}')">
          ${I.pot}
          <div class="peek">${c.hash.slice(0,5)}···</div>
        </div>`}
    </div>`;
  });
  return h + "</div>";
}

function findsTableHtml(){
  if(shelf.length === 0){
    return `<div class="finds-table"><div class="finds-empty">No fragments cataloged yet — click a buried tile above using your selected tool.</div></div>`;
  }
  let h = `<div class="finds-table" id="finds-table">`;
  shelf.forEach((f, idx)=>{
    const tool = TOOL_BY_ACTION[f.action];
    h += `<div class="find-item ${f.flag||''}" draggable="true" data-idx="${idx}"
        ondragstart="onDragStart(event, ${idx})" ondragover="onDragOver(event, ${idx})"
        ondragleave="onDragLeave(event)" ondrop="onDrop(event, ${idx})" ondragend="onDragEnd(event)">
      <div class="find-order">${idx+1}</div>
      <div class="find-action-badge">${tool.icon}${tool.label}</div>
      <div class="find-hash">${f.hash}</div>
      <div class="find-msg">${escapeHtml(f.message)}</div>
      ${f.merges.length ? `<div class="find-merged">+ ${f.merges.length} bonded fragment${f.merges.length>1?'s':''}</div>` : ""}
      <div class="find-nudges">
        <button class="nudge-btn" onclick="nudge(${idx}, -1)" ${idx===0?'disabled style="opacity:.3"':''}>◀ Move</button>
        <button class="nudge-btn" onclick="nudge(${idx}, 1)" ${idx===shelf.length-1?'disabled style="opacity:.3"':''}>Move ▶</button>
      </div>
      <button class="return-btn" onclick="returnToSite(${idx})">${I.returnIcon}Return to Site</button>
    </div>`;
  });
  return h + "</div>";
}

function renderDigScreen(){
  const site = currentSite();
  el(`<div class="wrap screen">
    ${topbar()}
    ${trail()}
    <div class="site-label">${site.region} — ${site.name}</div>
    <div class="brief-card" style="margin-bottom: 20px; padding: 15px 20px;">
        <div class="field-notes-title" style="margin-bottom: 6px;">Mission Objective</div>
        <p class="brief-text" style="margin-bottom: 0;">${site.briefing}</p>
    </div>
    ${toolbeltHtml()}
    ${digGridHtml(site)}
    <div class="table-label">Finds Table</div>
    ${findsTableHtml()}
    <div class="table-actions"><button class="undo-btn" onclick="undoLast()" ${history.length===0?'disabled':''}>${I.undo}Undo Last Action</button></div>
    <div id="feedback-area"></div>
    <div class="catalog-actions">
      <button class="btn btn-primary" onclick="submitFindings()">Catalog Findings</button>
    </div>
  </div>`);
  renderRelicField();
}

function selectTool(id){
  activeTool = id;
  renderDigScreen();
}

function spawnDust(x, y, color){
  for(let i=0;i<14;i++){
    const p = document.createElement("div");
    const size = 3 + Math.random()*4;
    const angle = Math.random()*Math.PI*2;
    const dist = 30 + Math.random()*50;
    p.className = "dust-p";
    p.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color};
      --dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;animation:dustBurst .7s ease-out forwards;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 750);
  }
}

function handleTileClick(id){
  if(excavated.has(id)) return;
  const site = currentSite();
  const commit = site.commits.find(c=>c.id===id);
  const faceEl = document.getElementById("face-"+id);
  const rect = faceEl.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;

  if(activeTool === "pick"){
    excavated.add(id);
    shelf.push({ keepId:id, hash:commit.hash, message:commit.message, action:"pick", merges:[] });
    history.push({ type:"pick", id });
    spawnDust(cx, cy, "#c9a866");
    renderDigScreen();
    return;
  }
  if(activeTool === "drop"){
    excavated.add(id);
    history.push({ type:"drop", id });
    spawnDust(cx, cy, "#6b5738");
    renderDigScreen();
    return;
  }
  if(activeTool === "reword"){
    rewordTargetId = id;
    faceEl.parentElement.insertAdjacentHTML("beforeend", `
      <div class="reword-overlay">
        <div class="ro-label">Re-carve inscription</div>
        <input type="text" id="reword-input" value="" placeholder="type the true meaning..." autofocus />
        <button onclick="confirmReword('${id}')">Carve It</button>
      </div>`);
    setTimeout(()=>{ const inp=document.getElementById("reword-input"); if(inp) inp.focus(); }, 30);
    return;
  }
  if(activeTool === "squash" || activeTool === "fixup"){
    if(shelf.length === 0){
      toast("Nothing on your table yet — lift a fragment first with the Trowel or Chisel.");
      return;
    }
    const last = shelf[shelf.length-1];
    last.merges.push({ id, type:activeTool, hash:commit.hash, message:commit.message });
    excavated.add(id);
    history.push({ type:"merge", id, targetKeepId:last.keepId });
    spawnDust(cx, cy, activeTool==="squash" ? "#2f8f8a" : "#9c7a44");
    renderDigScreen();
    return;
  }
}

function confirmReword(id){
  const inp = document.getElementById("reword-input");
  const val = (inp ? inp.value : "").trim();
  if(!val){ toast("The inscription needs actual words before you carve it."); return; }
  const site = currentSite();
  const commit = site.commits.find(c=>c.id===id);
  excavated.add(id);
  shelf.push({ keepId:id, hash:commit.hash, message:val, action:"reword", merges:[] });
  history.push({ type:"reword", id });
  renderDigScreen();
}

function returnToSite(idx){
  const f = shelf[idx];
  if(!f) return;
  excavated.delete(f.keepId);
  f.merges.forEach(m => excavated.delete(m.id));
  shelf.splice(idx, 1);
  history = history.filter(h => h.id !== f.keepId && !(f.merges.some(m=>m.id===h.id)));
  toast("Fragment returned to the dig — pick a tool and click it again.");
  renderDigScreen();
}

function undoLast(){
  const last = history.pop();
  if(!last) return;
  if(last.type === "pick" || last.type === "reword"){
    shelf = shelf.filter(f => f.keepId !== last.id);
    excavated.delete(last.id);
  } else if(last.type === "drop"){
    excavated.delete(last.id);
  } else if(last.type === "merge"){
    const target = shelf.find(f => f.keepId === last.targetKeepId);
    if(target) target.merges = target.merges.filter(m => m.id !== last.id);
    excavated.delete(last.id);
  }
  renderDigScreen();
}

let draggedIdx = null;
function onDragStart(e, idx){ draggedIdx = idx; e.dataTransfer.effectAllowed="move"; e.currentTarget.classList.add("dragging"); }
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add("drag-over"); }
function onDragLeave(e){ e.currentTarget.classList.remove("drag-over"); }
function onDrop(e, idx){
  e.preventDefault(); e.currentTarget.classList.remove("drag-over");
  if(draggedIdx===null || draggedIdx===idx){ draggedIdx=null; return; }
  const [moved] = shelf.splice(draggedIdx,1);
  shelf.splice(idx,0,moved);
  draggedIdx = null;
  renderDigScreen();
}
function onDragEnd(){ document.querySelectorAll(".find-item").forEach(f=>f.classList.remove("dragging","drag-over")); draggedIdx=null; }

function nudge(idx, dir){
  const target = idx + dir;
  if(target < 0 || target >= shelf.length) return;
  [shelf[idx], shelf[target]] = [shelf[target], shelf[idx]];
  renderDigScreen();
}

function checkSolution(site){
  shelf.forEach(f=>f.flag="");
  let success = true;
  const sol = site.solution;

  if(shelf.length !== sol.order.length) success = false;

  shelf.forEach((f, idx)=>{
    const expected = sol.order[idx];
    if(!expected){ f.flag="flag-bad"; success=false; return; }
    let ok = true;
    if(f.keepId !== expected.keep) ok = false;
    if(f.action !== expected.action) ok = false;
    if(expected.action === "reword"){
      if(!f.message.toLowerCase().includes(expected.keyword.toLowerCase())) ok = false;
    }
    const expectedMerges = expected.merges || [];
    const gotIds = f.merges.map(m=>m.id).sort();
    const expIds = expectedMerges.map(m=>m.id).sort();
    if(JSON.stringify(gotIds) !== JSON.stringify(expIds)) ok = false;
    else{
      for(const m of f.merges){
        const exp = expectedMerges.find(e=>e.id===m.id);
        if(!exp || exp.type !== m.type){ ok=false; break; }
      }
    }
    f.flag = ok ? "flag-good" : "flag-bad";
    if(!ok) success = false;
  });

  return success;
}

function submitFindings(){
  const site = currentSite();
  const success = checkSolution(site);
  renderDigScreen();
  const fb = document.getElementById("feedback-area");
  if(success){
    saveProgress();
    fb.innerHTML = `<p class="feedback-msg good">The stratigraphy is sound. Every fragment sits exactly where it belongs.</p>
      <div class="catalog-actions"><button class="btn btn-primary" onclick="completeSite()">Seal This Site</button></div>`;
  } else {
    progress.preservation = Math.max(0, progress.preservation - 12);
    progress.mistakes++;
    saveProgress();
    if(progress.preservation <= 0){
      renderSiteFailure();
      return;
    }
    fb.innerHTML = `<p class="feedback-msg bad">Something's off — the flagged fragments on your table don't match the true dig. Use "Return to Site" on any flagged card to redo just that one.</p>`;
  }
}

function renderSiteFailure(){
  el(`<div class="wrap screen">
    ${topbar()}
    ${trail()}
    <div class="seal-card">
      <div class="seal bad">${I.skull}</div>
      <div class="seal-title">Site Collapsed</div>
      <p class="seal-sub">Preservation ran out — too much was lost to bad calls. The record here can't be trusted anymore.</p>
      <div class="actions">
        <button class="btn btn-primary" onclick="retrySite()">Retry This Site</button>
        <button class="btn" onclick="renderTitle()">Return to Camp</button>
      </div>
    </div>
  </div>`);
  renderRelicField();
}

function retrySite(){
  progress.preservation = 100;
  saveProgress();
  beginSite();
}

function completeSite(){
  el(`<div class="wrap screen">
    ${topbar()}
    ${trail()}
    <div class="seal-card">
      <div class="seal">${I.pot}</div>
      <div class="seal-title">Site Sealed</div>
      <p class="seal-sub">The record is clean. The next site awaits.</p>
      <div class="actions"><button class="btn btn-primary" onclick="advanceSite()">${progress.siteIndex+1 < SITES.length ? "Travel to Next Site" : "Return to Base Camp"}</button></div>
    </div>
  </div>`);
  renderRelicField();
  launchGold();
}

function advanceSite(){
  progress.siteIndex++;
  saveProgress();
  if(progress.siteIndex >= SITES.length){ renderFinal(); } else { renderBrief(); }
}

function renderFinal(){
  const totalHunks = SITES.reduce((a,s)=>a+s.commits.length,0);
  const accuracy = Math.max(0, Math.round(((totalHunks - progress.mistakes) / totalHunks) * 100));
  let rankIcon, rankGlow, rankName, rankSub;
  if(progress.mistakes === 0){ rankIcon=I.medalGold; rankGlow="#d9a441"; rankName="Chief Archivist"; rankSub="Every site cataloged without a single misread fragment."; }
  else if(progress.mistakes <= 3){ rankIcon=I.medalSilver; rankGlow="#c9c9c9"; rankName="Field Archivist"; rankSub="A few misreads along the way — nothing the record couldn't survive."; }
  else{ rankIcon=I.medalBronze; rankGlow="#c98a4f"; rankName="Junior Digger"; rankSub="You reached the last site. Revisit the Field Guide before your next dig."; }

  el(`<div class="wrap screen">
    <div class="final-card">
      <div class="brief-eyebrow" style="text-align:center">EXPEDITION COMPLETE</div>
      ${medalSvg(rankIcon,rankGlow)}
      <div class="rank-name">${rankName}</div>
      <p class="rank-sub">${rankSub}</p>
      <div class="stat-row">
        <div class="stat"><div class="stat-value">${accuracy}%</div><div class="stat-label">Accuracy</div></div>
        <div class="stat"><div class="stat-value">${preservationPercent()}%</div><div class="stat-label">Preservation</div></div>
        <div class="stat"><div class="stat-value">${SITES.length}</div><div class="stat-label">Sites Sealed</div></div>
      </div>
      <div class="field-guide-block">
        <h3>The Archivist's Field Guide</h3>
        ${guideToolsContent()}
      </div>
      <div class="field-guide-block">
        <h3>The Git Concept, Plainly</h3>
        ${guideConceptContent()}
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="startGame()">Dig Again</button>
        <button class="btn" onclick="renderTitle()">Return to Camp</button>
      </div>
    </div>
  </div>`);
  renderRelicField();
  if(progress.mistakes <= 3) launchGold();
}

function launchGold(){
  if(window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  for(let i=0;i<30;i++){
    const g = document.createElement("div");
    const size = 3 + Math.random()*3;
    g.className = "gold-p";
    g.style.cssText = `left:${Math.random()*100}vw;width:${size}px;height:${size}px;
      background:${Math.random()>0.5?"#d9a441":"#c9a866"};border-radius:1px;
      animation-duration:${3+Math.random()*3}s;animation-delay:${Math.random()*1.2}s`;
    document.body.appendChild(g);
    setTimeout(()=>g.remove(), 8000);
  }
}

renderTitle();
</script>
</body>
</html>
